# Secret for Orchestrator Agent
apiVersion: v1
kind: Secret
metadata:
  name: orchestrator-secrets
  labels:
    app: orchestrator-agent
    app.kubernetes.io/part-of: nannos
type: Opaque
stringData:
  AZURE_OPENAI_API_KEY: YOUR_AZURE_OPENAI_API_KEY
  OIDC_CLIENT_SECRET: YOUR_ORCHESTRATOR_OIDC_CLIENT_SECRET
  POSTGRES_PASSWORD: YOUR_DOCSTORE_PG_PASSWORD
---
# Secret for Playground Backend
apiVersion: v1
kind: Secret
metadata:
  name: console-secrets
  labels:
    app: console
    app.kubernetes.io/part-of: nannos
type: Opaque
stringData:
  # Secrets from ECS TaskDefinition
  SECRET_KEY: YOUR_SECRET_KEY
  OIDC_CLIENT_SECRET: YOUR_CONSOLE_OIDC_CLIENT_SECRET
  POSTGRES_PASSWORD: YOUR_CONSOLE_POSTGRES_PASSWORD
  KEYCLOAK_ADMIN_CLIENT_SECRET: YOUR_KEYCLOAK_ADMIN_CLIENT_SECRET
---
# Secret for Agent Runner
apiVersion: v1
kind: Secret
metadata:
  name: agent-runner-secrets
  labels:
    app: agent-runner
    app.kubernetes.io/part-of: nannos
type: Opaque
stringData:
  AZURE_OPENAI_API_KEY: YOUR_AZURE_OPENAI_API_KEY
  OIDC_CLIENT_SECRET: YOUR_AGENT_RUNNER_OIDC_CLIENT_SECRET
  POSTGRES_PASSWORD: YOUR_AGENT_RUNNER_POSTGRES_PASSWORD
---
# Secret for Agent Creator
apiVersion: v1
kind: Secret
metadata:
  name: agent-creator-secrets
  labels:
    app: agent-creator
    app.kubernetes.io/part-of: nannos
type: Opaque
stringData:
  OIDC_CLIENT_SECRET: YOUR_AGENT_CREATOR_OIDC_CLIENT_SECRET
---
# Secret for Slack Client
apiVersion: v1
kind: Secret
metadata:
  name: client-slack-secrets
  labels:
    app: client-slack
    app.kubernetes.io/part-of: nannos
type: Opaque
stringData:
  OIDC_CLIENT_SECRET: YOUR_SLACK_CLIENT_OIDC_CLIENT_SECRET
  POSTGRES_PASSWORD: YOUR_SLACK_CLIENT_POSTGRES_PASSWORD
  SLACK_SIGNING_SECRET: YOUR_SLACK_SIGNING_SECRET (RANDOM STRING)
  V2_COOKIE_SECRET: YOUR_V2_COOKIE_SECRET (RANDOM STRING)
---
# Secret for Email Client
apiVersion: v1
kind: Secret
metadata:
  name: client-email-secrets
  labels:
    app: client-email
    app.kubernetes.io/part-of: nannos
type: Opaque
stringData:
  OIDC_CLIENT_SECRET: YOUR_EMAIL_CLIENT_OIDC_CLIENT_SECRET
  POSTGRES_PASSWORD: YOUR_EMAIL_CLIENT_POSTGRES_PASSWORD

---
AWSTemplateFormatVersion: 2010-09-09
Description: 'RC+/Alloy - Sessions and Users tables (v{{ project_version }})'

Resources:

  SessionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: '{{ env }}-{{ project_id }}-{{ software_component }}-chat-ui-sessions'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: session_id
          AttributeType: S
      KeySchema:
        - AttributeName: session_id
          KeyType: HASH
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: false
      SSESpecification:
        SSEEnabled: true
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      Tags:
        - { Key: 'Name', Value: '{{ env }}-{{ project_id }}-{{ software_component }}-chat-ui-sessions' }
        - { Key: 'Project', Value: '{{ project_id }}' }
        - { Key: 'Environment', Value: '{{ env }}' }
        - { Key: 'Version', Value: 'v{{ project_version }}' }
        - { Key: 'Repository', Value: '{{ git_info.repo_name }}' }

Outputs:

  SessionsTableName:
    Description: 'Sessions DynamoDB table name'
    Export:
      Name: '{{ project_id }}-{{ software_component }}-chat-ui-sessions-table-name'
    Value: !Ref SessionsTable

  SessionsTableArn:
    Description: 'Sessions DynamoDB table ARN'
    Export:
      Name: '{{ project_id }}-{{ software_component }}-chat-ui-sessions-table-arn'
    Value: !GetAtt SessionsTable.Arn

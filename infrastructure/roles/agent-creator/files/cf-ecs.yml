---
AWSTemplateFormatVersion: 2010-09-09
Description: 'RC+/Alloy - Agent Creator Infrastructure - ECS task and service (v{{ project_version }})'


Conditions:
  IsProd:
    !Equals ['{{ env }}', 'prod']


Resources:

  AgentCreatorEcsExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: '{{ env }}-{{ project_id }}-{{ software_component }}-agent-creator-ecs-er'
      Description: 'Alloy Agent Creator Infrastructure ECS task execution role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: 'Allow'
            Principal:
              Service: 'ecs-tasks.amazonaws.com'
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - !ImportValue '{{ project_id }}-common-for-execution-role-arn'
      Policies:
        - PolicyName: 'AgentCreatorTaskExecutionPolicy'
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: 'ECRGetImageAgentCreator'
                Effect: 'Allow'
                Action:
                  - 'ecr:GetDownloadUrlForLayer'
                  - 'ecr:BatchGetImage'
                  - 'ecr:BatchCheckLayerAvailability'
                Resource: !Sub 'arn:aws:ecr:${AWS::Region}:${AWS::AccountId}:repository/{{ agent_creator_ecr_repository_name }}'
              - Sid: 'GetAgentCreatorSecrets'
                Effect: 'Allow'
                Action:
                  - 'ssm:GetParameter'
                  - 'ssm:GetParameters'
                Resource:
                  - !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter{{ ssmkey_agent_creator_oidc_client_secret }}'
                  - !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter{{ ssmkey_langsmith_api_key }}'
      Tags:
        - { Key: 'Name', Value: '{{ env }}-{{ project_id }}-{{ software_component }}-agent-creator-ecs-execution-role' }
        - { Key: 'Project', Value: '{{ project_id }}' }
        - { Key: 'Environment', Value: '{{ env }}' }
        - { Key: 'Version', Value: 'v{{ project_version }}' }
        - { Key: 'Repository', Value: '{{ git_info.repo_name }}' }

  AgentCreatorEcsTaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: '{{ env }}-{{ project_id }}-{{ software_component }}-agent-creator-task-role'
      Description: 'Alloy Agent Creator Infrastructure ECS task role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: 'Allow'
            Principal:
              Service: 'ecs-tasks.amazonaws.com'
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - !ImportValue '{{ project_id }}-common-for-task-role-arn'
      Policies:
        - PolicyName: 'AgentCreatorTaskPolicy'
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: 'DynamoDBCheckpointsAccess'
                Effect: 'Allow'
                Action:
                  - 'dynamodb:Query'
                  - 'dynamodb:GetItem'
                  - 'dynamodb:PutItem'
                  - 'dynamodb:UpdateItem'
                  - 'dynamodb:DeleteItem'
                  - 'dynamodb:BatchGetItem'
                  - 'dynamodb:BatchWriteItem'
                  - 'dynamodb:DescribeTable'
                Resource:
                  - !ImportValue '{{ project_id }}-{{ software_component }}-langgraph-checkpoints-table-arn'
              - Sid: 's3CheckpointsAccess'
                Effect: 'Allow'
                Action:
                  - 's3:GetObject'
                  - 's3:PutObject'
                  - 's3:DeleteObject'
                  - 's3:ListBucket'
                  - 's3:PutObjectTagging'
                  - 's3:GetBucketLifecycleConfiguration'
                  - 's3:PutBucketLifecycleConfiguration'
                Resource:
                  - !Sub
                    - '${BucketArn}/*'
                    - BucketArn: !ImportValue '{{ project_id }}-{{ software_component }}-orchestrator-checkpoints-bucket-arn'
                  - !ImportValue '{{ project_id }}-{{ software_component }}-orchestrator-checkpoints-bucket-arn'
              - Sid: 'BedrockInvokeModel'
                Effect: 'Allow'
                Action:
                  - 'bedrock:InvokeModel'
                  - 'bedrock:InvokeModelWithResponseStream'
                Resource:
                  - !Sub 'arn:aws:bedrock:${AWS::Region}:${AWS::AccountId}:inference-profile/*'
                  - 'arn:aws:bedrock:*::foundation-model/*'
      Tags:
        - { Key: 'Name', Value: '{{ env }}-{{ project_id }}-{{ software_component }}-agent-creator-task-role' }
        - { Key: 'Project', Value: '{{ project_id }}' }
        - { Key: 'Environment', Value: '{{ env }}' }
        - { Key: 'Version', Value: 'v{{ project_version }}' }
        - { Key: 'Repository', Value: '{{ git_info.repo_name }}' }

  # CloudWatch Logs Group for Agent Creator
  AgentCreatorLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/ecs/{{ env }}-{{ project_id }}-{{ software_component }}-agent-creator'
      RetentionInDays: !If [IsProd, 30, 7]
      Tags:
        - { Key: 'Name', Value: '{{ env }}-{{ project_id }}-{{ software_component }}-agent-creator-logs' }
        - { Key: 'Project', Value: '{{ project_id }}' }
        - { Key: 'Environment', Value: '{{ env }}' }
        - { Key: 'Version', Value: 'v{{ project_version }}' }
        - { Key: 'Repository', Value: '{{ git_info.repo_name }}' }

  AgentCreatorTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    DependsOn: AgentCreatorLogGroup
    Properties:
      Family: '{{ env }}-{{ project_id }}-{{ software_component }}-agent-creator'
      TaskRoleArn: !GetAtt AgentCreatorEcsTaskRole.Arn
      ExecutionRoleArn: !GetAtt AgentCreatorEcsExecutionRole.Arn
      Cpu: '{{ agent_creator_task_cpu }}'
      Memory: '{{ agent_creator_task_memory }}'
      NetworkMode: 'awsvpc'
      RequiresCompatibilities: [ 'FARGATE' ]
      RuntimePlatform: { CpuArchitecture : 'ARM64', OperatingSystemFamily: 'LINUX' }
      ContainerDefinitions:
        - Name: '{{ env }}-{{ project_id }}-{{ software_component }}-agent-creator'
          Image: '{{ agent_creator_docker_image }}'
          Essential: true
          Interactive: true
          PortMappings:
            - { ContainerPort: '{{ agent_creator_public_api_port }}', Protocol: 'tcp' }
          Environment:
            - { Name: 'LOG_MODE', Value: 'JSON' }
            - { Name: 'LOG_LEVEL', Value: '{{ log_level }}' }
            - { Name: 'LOG_SET_EXCEPTHOOK', Value: '1' }
            - { Name: 'ENV', Value: '{{ env }}' }
            - { Name: 'AWS_REGION', Value: !Ref 'AWS::Region' }
            - { Name: 'APP_VERSION', Value: 'v{{ project_version }}' }
            - { Name: 'OIDC_ISSUER', Value: '{{ oidc_issuer }}' }
            - { Name: 'ORCHESTRATOR_CLIENT_ID', Value: '{{ orchestrator_oidc_client_id }}' }
            - { Name: 'AGENT_CLIENT_ID', Value: '{{ agent_creator_client_id }}' }
            - { Name: 'AGENT_BASE_URL', Value: 'https://{{ agent_creator_fqdn }}' }
            - { Name: 'OIDC_CLIENT_ID', Value: '{{ agent_creator_client_id }}' }
            - { Name: 'LANGSMITH_TRACING', Value: '{{ langsmith_tracing | string | lower }}' }
            - { Name: 'LANGSMITH_ENDPOINT', Value: '{{ langsmith_endpoint }}' }
            - { Name: 'LANGSMITH_PROJECT', Value: '{{ langsmith_project }}' }
            - { Name: 'CHECKPOINT_DYNAMODB_TABLE_NAME', Value: '{{ checkpoint_dynamodb_table_name }}' }
            - { Name: 'CHECKPOINT_S3_BUCKET_NAME', Value: '{{ checkpoint_s3_bucket_name }}' }
            - { Name: 'BEDROCK_MODEL_ID', Value: '{{ bedrock_model_id }}' }
            - { Name: 'BEDROCK_READ_TIMEOUT', Value: '{{ bedrock_read_timeout }}' }
            - { Name: 'BEDROCK_CONNECT_TIMEOUT', Value: '{{ bedrock_connect_timeout }}' }
            - { Name: 'BEDROCK_MAX_RETRY_ATTEMPTS', Value: '{{ bedrock_max_retry_attempts }}' }
            - { Name: 'BEDROCK_RETRY_MODE', Value: '{{ bedrock_retry_mode }}' }
            - { Name: 'PLAYGROUND_BACKEND_URL', Value: 'https://{{ chat_ui_fqdn }}' }
            - { Name: 'PLAYGROUND_FRONTEND_URL', Value: 'https://{{ chat_ui_fqdn }}' }
            - { Name: 'MCP_GATEWAY_URL', Value: '{{ mcp_gateway_url }}' }
            - { Name: 'MCP_GATEWAY_CLIENT_ID', Value: '{{ mcp_gateway_client_id }}' }
          Secrets:
            - { Name: 'OIDC_CLIENT_SECRET', ValueFrom: '{{ ssmkey_agent_creator_oidc_client_secret }}' }
            - { Name: 'LANGSMITH_API_KEY', ValueFrom: '{{ ssmkey_langsmith_api_key }}' }
          LogConfiguration:
            LogDriver: 'awslogs'
            Options:
              awslogs-group: !Sub '/ecs/{{ env }}-{{ project_id }}-{{ software_component }}-agent-creator'
              awslogs-region: !Ref 'AWS::Region'
              awslogs-stream-prefix: 'ecs'
          HealthCheck:
            Command: ['CMD-SHELL', 'python -c "import urllib.request; urllib.request.urlopen(\"http://localhost:{{ agent_creator_public_api_port }}/.well-known/agent-card.json\").read()" || exit 1']
            Interval: 60
            Retries: 3
            StartPeriod: 60
            Timeout: 5

  AgentCreatorSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      VpcId: !ImportValue '{{ project_id }}-vpc-id-v2'
      GroupDescription: 'Alloy Agent Creator Infrastructure security group'
      SecurityGroupIngress:
        - {IpProtocol: 'tcp', FromPort: '{{ agent_creator_public_api_port }}', ToPort: '{{ agent_creator_public_api_port }}', CidrIp: !ImportValue '{{ project_id }}-vpc-cidr4', Description: 'Agent Creator - Local VPC (IPv4)'}
        - {IpProtocol: 'tcp', FromPort: '{{ agent_creator_public_api_port }}', ToPort: '{{ agent_creator_public_api_port }}', CidrIpv6: !ImportValue '{{ project_id }}-vpc-cidr6', Description: 'Agent Creator - Local VPC (IPv6)'}
        - {IpProtocol: 'tcp', FromPort: '{{ agent_creator_public_api_port }}', ToPort: '{{ agent_creator_public_api_port }}', CidrIp: !ImportValue '{{ project_id }}-vpn-cidr4', Description: 'Agent Creator - VPN (IPv4)'}
        - {IpProtocol: 'tcp', FromPort: '{{ agent_creator_public_api_port }}', ToPort: '{{ agent_creator_public_api_port }}', CidrIpv6: !ImportValue '{{ project_id }}-vpn-cidr6', Description: 'Agent Creator - VPN (IPv6)'}
        - {IpProtocol: 'tcp', FromPort: '{{ agent_creator_public_api_port }}', ToPort: '{{ agent_creator_public_api_port }}', SourceSecurityGroupId: !ImportValue '{{ project_id }}-public-alb-v2-security-group-id', Description: 'Agent Creator - LoadBalancer'}
      Tags:
        - { Key: 'Name', Value: '{{ env }}-{{ project_id }}-{{ software_component }}-agent-creator-sg' }
        - { Key: 'Project', Value: '{{ project_id }}' }
        - { Key: 'Environment', Value: '{{ env }}' }
        - { Key: 'Version', Value: 'v{{ project_version }}' }
        - { Key: 'Repository', Value: '{{ git_info.repo_name }}' }

  AgentCreatorTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      VpcId: !ImportValue '{{ project_id }}-vpc-id-v2'
      HealthCheckEnabled: true
      HealthCheckIntervalSeconds: 30
      HealthCheckPath: '/.well-known/agent-card.json'
      HealthCheckPort: '{{ agent_creator_public_api_port }}'
      HealthCheckProtocol: 'HTTP'
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Matcher:
        HttpCode: '200'
      Port: '{{ agent_creator_public_api_port }}'
      Protocol: 'HTTP'
      TargetGroupAttributes:
        - Key: 'deregistration_delay.timeout_seconds'
          Value: !If [IsProd, '30', '0']
        - Key: 'stickiness.enabled'
          Value: false
      TargetType: 'ip'
      Tags:
        - { Key: 'Name', Value: '{{ env }}-{{ project_id }}-{{ software_component }}-agent-creator' }
        - { Key: 'Project', Value: '{{ project_id }}' }
        - { Key: 'Environment', Value: '{{ env }}' }
        - { Key: 'Version', Value: 'v{{ project_version }}' }
        - { Key: 'Repository', Value: '{{ git_info.repo_name }}' }

  AgentCreatorAlbListenerRule:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      Actions:
        - Type: 'forward'
          TargetGroupArn: !Ref AgentCreatorTargetGroup
      Conditions:
        - Field: 'host-header'
          HostHeaderConfig:
            Values:
              - '{{ agent_creator_fqdn }}'
      ListenerArn: !ImportValue '{{ project_id }}-public-alb-v2-https-listener'
      # NOTE: The Priority is global and must have unique value across all services we have
      Priority: 603
  
  AgentCreatorService:
    Type: AWS::ECS::Service
    Properties:
      ServiceName: '{{ env }}-{{ project_id }}-{{ software_component }}-agent-creator'
      Cluster: !ImportValue '{{ project_id }}-shared-ecs-cluster'
      LaunchType: 'FARGATE'
      DeploymentConfiguration:
        MinimumHealthyPercent: 100
        MaximumPercent: 200
      # Do not change DesiredCount. This will cause a re-deployment of the below specified TaskDefinition
      # which we do not want. If you want to update the number of tasks running, edit instead
      # the resource AgentCreatorScalableTarget below.
      DesiredCount: 1 # ! __WARNING__ : See comment above
      TaskDefinition: !Ref AgentCreatorTaskDefinition
      EnableECSManagedTags: true
      EnableExecuteCommand: true
      PropagateTags: 'TASK_DEFINITION'
      HealthCheckGracePeriodSeconds: 300
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: 'DISABLED'
          SecurityGroups:
            - !Ref AgentCreatorSecurityGroup
            - !ImportValue '{{ project_id }}-public-alb-v2-security-group-id'
          Subnets:
            - !ImportValue '{{ project_id }}-subnet-dual-pri1a'
            - !ImportValue '{{ project_id }}-subnet-dual-pri1b'
            - !ImportValue '{{ project_id }}-subnet-dual-pri1c'
      LoadBalancers:
        - TargetGroupArn: !Ref AgentCreatorTargetGroup
          ContainerPort: '{{ agent_creator_public_api_port }}'
          ContainerName: '{{ env }}-{{ project_id }}-{{ software_component }}-agent-creator'

  AgentCreatorScalableTarget:
    Type: AWS::ApplicationAutoScaling::ScalableTarget
    Properties:
      MaxCapacity: !If [IsProd, 2, 1]
      MinCapacity: !If [IsProd, 1, 1]
      RoleARN: !GetAtt AgentCreatorEcsAutoScalingRole.Arn
      ServiceNamespace: 'ecs'
      ScalableDimension: 'ecs:service:DesiredCount'
      ResourceId:
        !Sub
          - 'service/${Cluster}/${Name}'
          - Cluster: !ImportValue '{{ project_id }}-shared-ecs-cluster'
            Name: !GetAtt AgentCreatorService.Name

  AgentCreatorEcsAutoScalingPolicyCPU:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Properties:
      PolicyName: '{{ env }}-{{ project_id }}-{{ software_component }}-agent-creator-target-tracking-cpu50'
      PolicyType: 'TargetTrackingScaling'
      ScalingTargetId: !Ref AgentCreatorScalableTarget
      TargetTrackingScalingPolicyConfiguration:
        TargetValue: 50.0
        ScaleInCooldown: 300
        ScaleOutCooldown: 60
        PredefinedMetricSpecification:
          PredefinedMetricType: 'ECSServiceAverageCPUUtilization'

  AgentCreatorEcsAutoScalingRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: '{{ env }}-{{ project_id }}-{{ software_component }}-agent-creator-ecs-as'
      Description: 'Alloy Agent Creator Infrastructure ECS auto-scaling role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: 'Allow'
            Principal:
              Service: 'ecs.application-autoscaling.amazonaws.com'
            Action: 'sts:AssumeRole'
      Policies:
        - PolicyName: 'AllowCloudwatchAlarms'
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: 'Allow'
                Action:
                  - 'ecs:DescribeServices'
                  - 'ecs:UpdateService'
                  - 'cloudwatch:DeleteAlarms'
                  - 'cloudwatch:DescribeAlarms'
                  - 'cloudwatch:PutMetricAlarm'
                Resource: '*'
              - Effect: 'Allow'
                Action: 'ecs:UpdateService'
                Resource:
                  - !Ref AgentCreatorService
      Tags:
        - { Key: 'Name', Value: '{{ env }}-{{ project_id }}-{{ software_component }}-agent-creator-ecs-as-role' }
        - { Key: 'Project', Value: '{{ project_id }}'}
        - { Key: 'Environment', Value: '{{ env }}'}
        - { Key: 'Version', Value: 'v{{ project_version }}'}
        - { Key: 'Repository', Value: '{{ git_info.repo_name }}'}
  
  AgentCreatorCpuUtilizationHighAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: 'AgentCreatorCpuUtilizationHigh'
      AlarmDescription: 'Alloy Agent Creator - CPUUtilization is higher than 90% for 20 minutes'
      MetricName: 'CPUUtilization'
      Namespace: 'AWS/ECS'
      Dimensions:
        - Name: 'ClusterName'
          Value: !ImportValue '{{ project_id }}-shared-ecs-cluster'
        - Name: 'ServiceName'
          Value: !GetAtt AgentCreatorService.Name
      ComparisonOperator: 'GreaterThanThreshold'
      Statistic: 'Average'
      Threshold: 90
      Period: 1200
      EvaluationPeriods: 1
      TreatMissingData: 'breaching'

  AgentCreatorMemoryUtilizationHighAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: 'AgentCreatorMemoryUtilizationHigh'
      AlarmDescription: 'Alloy Agent Creator - MemoryUtilization is higher than 90% for 20 minutes'
      MetricName: 'MemoryUtilization'
      Namespace: 'AWS/ECS'
      Dimensions:
        - Name: 'ClusterName'
          Value: !ImportValue '{{ project_id }}-shared-ecs-cluster'
        - Name: 'ServiceName'
          Value: !GetAtt AgentCreatorService.Name
      ComparisonOperator: 'GreaterThanThreshold'
      Statistic: 'Average'
      Threshold: 90
      Period: 1200
      EvaluationPeriods: 1
      TreatMissingData: 'breaching'

  AgentCreatorHealthyHostCountAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: 'AgentCreatorHealthyHostCount'
      AlarmDescription: 'Alloy Agent Creator - HealthyHostCount is lower than 1 for 1 minute'
      MetricName: 'HealthyHostCount'
      ComparisonOperator: 'LessThanThreshold'
      Namespace: 'AWS/ApplicationELB'
      Dimensions:
        - Name: 'LoadBalancer'
          Value: !ImportValue '{{ project_id }}-public-alb-v2-full-name'
        - Name: 'TargetGroup'
          Value: !GetAtt AgentCreatorTargetGroup.TargetGroupFullName
      Statistic: 'Maximum'
      Threshold: 1
      Period: 60
      EvaluationPeriods: 1
      TreatMissingData: 'breaching'

  AgentCreatorResponsesStatus2xxRatioAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: 'AgentCreatorResponsesStatus2xxRatio'
      AlarmDescription: 'Agent Creator responses status 2xx ratio'
      ComparisonOperator: 'LessThanThreshold'
      EvaluationPeriods: 1
      DatapointsToAlarm: 1
      Threshold: {{ response_2xx_ratio_threshold }}
      TreatMissingData: '{{ response_2xx_treat_missing_data }}'
      Metrics:
        - Id: ratio
          Label: 'Status 2xx ratio'
          Expression: 'status_2xx_count / requests_count'
          ReturnData: true
        - Id: requests_count
          ReturnData: false
          MetricStat:
            Period: 60
            Stat: 'Sum'
            Unit: 'Count'
            Metric:
              Namespace: 'AWS/ApplicationELB'
              MetricName: 'RequestCount'
              Dimensions:
                - Name: 'LoadBalancer'
                  Value: !ImportValue '{{ project_id }}-public-alb-v2-full-name'
                - Name: 'TargetGroup'
                  Value: !GetAtt AgentCreatorTargetGroup.TargetGroupFullName
        - Id: status_2xx_count
          ReturnData: false
          MetricStat:
            Period: 60
            Stat: 'Sum'
            Unit: 'Count'
            Metric:
              Namespace: 'AWS/ApplicationELB'
              MetricName: 'HTTPCode_Target_2XX_Count'
              Dimensions:
                - Name: 'LoadBalancer'
                  Value: !ImportValue '{{ project_id }}-public-alb-v2-full-name'
                - Name: 'TargetGroup'
                  Value: !GetAtt AgentCreatorTargetGroup.TargetGroupFullName

okta_domain: 'https://dev-123456.okta.com'  # TODO: placeholder, replace with actual domain
okta_client_id: '0oab123456XYZ7890'  # TODO: placeholder, replace with actual client ID
okta_audience: 'api://default'  # TODO: placeholder, replace with actual audience

azure_openai_chat_deployment: 'chatgpt-4o'
azure_openai_chat_model_name: 'gpt-4o'

langsmith_endpoint: https://eu.api.smith.langchain.com

orchestrator_agent_public_api_port: 10001
chat_ui_public_api_port: 8080


orchestrator_agent_fqdn: 'orchestrator.{{ domain_prefix }}alloy.ch'
chat_ui_fqdn: 'chat.{{ domain_prefix }}alloy.ch'
orchestrator_agent_task_cpu: 512
orchestrator_agent_task_memory: 1024
chat_ui_task_cpu: 256
chat_ui_task_memory: 512
orchestrator_agent_ecr_repository_name: '{{ env }}-{{ project_id }}-{{ software_component }}-orchestrator-agent'
chat_ui_ecr_repository_name: '{{ env }}-{{ project_id }}-{{ software_component }}-chat-ui'
response_2xx_ratio_threshold: 0.95
response_2xx_treat_missing_data: 'notBreaching'

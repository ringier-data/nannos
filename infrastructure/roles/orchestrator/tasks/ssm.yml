
- name: 'get the langsmith api key from the vault'
  set_fact:
    langsmith_api_key_obj: '{{ langsmith_api_key }}'

- name: 'upsert the Langsmith credentials into SSM parameter store'
  no_log: '{{ ansible_verbosity < 3 }}'
  ringier.aws_cicd.ssm_parameter:
    overwrite_value: 'changed'
    region: '{{ aws_region }}'
    name: '{{ ssmkey_langsmith_api_key }}'
    description: 'Langsmith API credentials for {{ project_id }}'
    string_type: 'SecureString'
    key_id: 'alias/gov-rcplus-devops-secrets'
    value: '{{ langsmith_api_key_obj }}'
    tags:
      Name: '{{ env }}-{{ project_id }}-{{ software_component }}-langsmith-api-key'
      Project: '{{ project_id }}'
      Environment: '{{ env }}'
      Repository: '{{ git_info.repo_name }}'
      Version: '{{ project_version }}'

- name: 'upload Orchestrator OIDC client secret to SSM'
  ringier.aws_cicd.ssm_parameter:
    overwrite_value: 'changed'
    name: '{{ ssmkey_orchestrator_oidc_client_secret }}'
    description: 'The OIDC client secret for the Orchestrator component of RC+/Alloy'
    string_type: 'SecureString'
    value: '{{ orchestrator_oidc_client_secret }}'
    tags:
      Name: '{{ env }}-{{ project_id }}-orchestrator-oidc-client-secret'
      Project: '{{ project_id }}'
      Environment: '{{ env }}'
      Repository: '{{ git_info.repo_name }}'
      Version: '{{ project_version }}'


- name: 'get the GCP key from vault'
  set_fact:
    gcp_key_obj: '{{ gcp_key }}'

- name: 'upsert the GCP credentials into SSM parameter store'
  no_log: '{{ ansible_verbosity < 3 }}'
  ringier.aws_cicd.ssm_parameter:
    overwrite_value: 'changed'
    region: '{{ aws_region }}'
    name: '{{ ssmkey_gcp_key }}'
    description: 'Gemini API credentials for {{ project_id }}'
    string_type: 'SecureString'
    key_id: 'alias/gov-rcplus-devops-secrets'
    value: '{{ gcp_key_obj | to_json }}'
    tags:
      Name: '{{ env }}-{{ project_id }}-{{ software_component }}-gcp-key'
      Project: '{{ project_id }}'
      Environment: '{{ env }}'
      Repository: '{{ git_info.repo_name }}'
      Version: '{{ project_version }}'

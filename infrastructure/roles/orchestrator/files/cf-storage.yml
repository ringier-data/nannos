---
AWSTemplateFormatVersion: 2010-09-09
Description: 'RC+/Alloy - Orchestrator Checkpoint Offloading - S3 storage (v{{ project_version }})'

Resources:

  CheckpointBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: '{{ checkpoint_s3_bucket_name }}'
      AccelerateConfiguration:
        AccelerationStatus: 'Suspended'
      AccessControl: 'Private'
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders:
              - '*'
            AllowedMethods:
              - 'GET'
              - 'PUT'
              - 'POST'
            AllowedOrigins:
              - '*'
            ExposedHeaders:
              - 'ETag'
            MaxAge: 3600
      IntelligentTieringConfigurations:
        - Id: 'IntelligentTiering'
          Status: 'Enabled'
          Tierings:
            - AccessTier: 'ARCHIVE_ACCESS'
              Days: 90
            - AccessTier: 'DEEP_ARCHIVE_ACCESS'
              Days: 365
      LifecycleConfiguration:
        Rules:
          - Id: 'AbortIncompleteUploadAfterOneDay'
            Status: 'Enabled'
            AbortIncompleteMultipartUpload:
              DaysAfterInitiation: 1
          - Id: 'DeleteAfterNinetyDays'
            Status: 'Enabled'
            ExpirationInDays: 90
          - Id: 'IntelligentTieringByDefault'
            Status: 'Enabled'
            Transitions:
              - StorageClass: 'INTELLIGENT_TIERING'
                TransitionInDays: 0
      OwnershipControls:
        Rules:
          - ObjectOwnership: 'BucketOwnerEnforced'
      PublicAccessBlockConfiguration:
        BlockPublicAcls: TRUE
        BlockPublicPolicy: TRUE
        IgnorePublicAcls: TRUE
        RestrictPublicBuckets: TRUE
      VersioningConfiguration:
        Status: 'Suspended'
      Tags:
        - { Key: 'Name', Value: '{{ env }}-{{ project_id }}-{{ software_component }}-orchestrator-checkpoints' }
        - { Key: 'Project', Value: '{{ project_id }}' }
        - { Key: 'Environment', Value: '{{ env }}' }
        - { Key: 'Version', Value: 'v{{ project_version }}' }
        - { Key: 'Repository', Value: '{{ git_info.repo_name }}' }

#============================== Outputs ==============================
Outputs:

  CheckpointBucketArn:
    Description: 'Bucket ARN for A2A files'
    Export:
      Name: '{{ project_id }}-{{ software_component }}-orchestrator-checkpoints-bucket-arn'
    Value: !GetAtt CheckpointBucket.Arn

  CheckpointBucketName:
    Description: 'Bucket name for A2A files'
    Export:
      Name: '{{ project_id }}-{{ software_component }}-orchestrator-checkpoints-bucket-name'
    Value: !Ref CheckpointBucket

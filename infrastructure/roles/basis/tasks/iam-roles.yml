---
- name: 'set cloudformation template'
  set_fact:
    cloudformation_template: '{{ role_path }}/files/cf-iam-roles.yml'

- name: 'deploy EKS pod identity IAM roles'
  include_role:
    name: 'ringier.aws_cicd.run_cloudformation'
  vars:
    stack_name: '{{ env }}-{{ project_id }}-{{ software_component }}-iam-roles'
    template: '{{ cloudformation_template }}'

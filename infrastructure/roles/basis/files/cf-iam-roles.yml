---
AWSTemplateFormatVersion: 2010-09-09
Description: 'RC+/Nannos - EKS Pod Identity IAM roles for application workloads (v{{ project_version }})'


Resources:

  # ------------------------------------------- Orchestrator Agent Pod IAM Role ------------------------------------------- #
  OrchestratorAgentPodRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: '{{ env }}-{{ project_id }}-{{ software_component }}-orchestrator-pod-role'
      Description: 'IAM role for Orchestrator Agent pod in EKS (via Pod Identity)'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: 'Allow'
            Principal:
              Service: 'pods.eks.amazonaws.com'
            Action:
              - 'sts:AssumeRole'
              - 'sts:TagSession'
      Policies:
        - PolicyName: '{{ env }}-{{ project_id }}-{{ software_component }}-orchestrator-pod-policy'
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: 'DynamoDBCheckpointsAccess'
                Effect: 'Allow'
                Action:
                  - 'dynamodb:Query'
                  - 'dynamodb:GetItem'
                  - 'dynamodb:PutItem'
                  - 'dynamodb:UpdateItem'
                  - 'dynamodb:DeleteItem'
                  - 'dynamodb:BatchGetItem'
                  - 'dynamodb:BatchWriteItem'
                  - 'dynamodb:DescribeTable'
                Resource:
                  - !ImportValue '{{ project_id }}-{{ software_component }}-langgraph-checkpoints-table-arn'
              - Sid: 'S3CheckpointsAccess'
                Effect: 'Allow'
                Action:
                  - 's3:GetObject'
                  - 's3:PutObject'
                  - 's3:DeleteObject'
                  - 's3:ListBucket'
                  - 's3:PutObjectTagging'
                  - 's3:GetBucketLifecycleConfiguration'
                  - 's3:PutBucketLifecycleConfiguration'
                Resource:
                  - !Sub
                    - '${BucketArn}/*'
                    - BucketArn: !ImportValue '{{ project_id }}-{{ software_component }}-orchestrator-checkpoints-bucket-arn'
                  - !ImportValue '{{ project_id }}-{{ software_component }}-orchestrator-checkpoints-bucket-arn'
              - Sid: 'S3FilesAccess'
                Effect: 'Allow'
                Action:
                  - 's3:GetObject'
                  - 's3:PutObject'
                  - 's3:ListBucket'
                Resource:
                  - !Sub
                    - '${BucketArn}/*'
                    - BucketArn: !ImportValue '{{ project_id }}-{{ software_component }}-files-bucket-arn'
                  - !ImportValue '{{ project_id }}-{{ software_component }}-files-bucket-arn'
              - Sid: 'BedrockInvokeModel'
                Effect: 'Allow'
                Action:
                  - 'bedrock:InvokeModel'
                  - 'bedrock:InvokeModelWithResponseStream'
                Resource:
                  - !Sub 'arn:aws:bedrock:${AWS::Region}:${AWS::AccountId}:inference-profile/*'
                  - 'arn:aws:bedrock:*::foundation-model/*'
              - Sid: 'MarketplaceModelAccess'
                Effect: 'Allow'
                Action:
                  - 'aws-marketplace:ViewSubscriptions'
                  - 'aws-marketplace:Subscribe'
                Resource: '*'
              - Sid: 'KmsEncryptDecrypt'
                Effect: 'Allow'
                Action:
                  - 'kms:DescribeKey'
                  - 'kms:GenerateDataKey'
                  - 'kms:Decrypt'
                  - 'kms:Encrypt'
                Resource:
                  - !ImportValue '{{ project_id }}-sensitive-data-kms-key-arn'
              - Sid: 'GetVaultSecrets'
                Effect: 'Allow'
                Action:
                  - 'ssm:GetParameter'
                  - 'ssm:GetParameters'
                Resource:
                  - !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter{{ ssmkey_vault_prefix }}*'
      Tags:
        - {Key: 'Name', Value: '{{ env }}-{{ project_id }}-{{ software_component }}-orchestrator-pod-role'}
        - {Key: 'Project', Value: '{{ project_id }}'}
        - {Key: 'Environment', Value: '{{ env }}'}
        - {Key: 'Version', Value: 'v{{ project_version }}'}
        - {Key: 'Repository', Value: '{{ git_info.repo_name }}'}

  OrchestratorAgentPodIdentity:
    Type: AWS::EKS::PodIdentityAssociation
    Properties:
      ClusterName: !ImportValue '{{ project_id }}-eks-cluster-name'
      Namespace: 'nannos'
      ServiceAccount: 'orchestrator-agent'
      RoleArn: !GetAtt OrchestratorAgentPodRole.Arn

  # ------------------------------------------- Agent Runner Pod IAM Role ------------------------------------------- #
  AgentRunnerPodRole:

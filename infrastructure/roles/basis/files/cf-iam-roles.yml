              Service: 'pods.eks.amazonaws.com'
            Action:
              - 'sts:AssumeRole'
              - 'sts:TagSession'
      Policies:
        - PolicyName: '{{ env }}-{{ project_id }}-{{ software_component }}-alloy-agent-pod-policy'
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: 'DynamoDBCheckpointsAccess'
                Effect: 'Allow'
                Action:
                  - 'dynamodb:Query'
                  - 'dynamodb:GetItem'
                  - 'dynamodb:PutItem'
                  - 'dynamodb:UpdateItem'
                  - 'dynamodb:DeleteItem'
                  - 'dynamodb:BatchGetItem'
                  - 'dynamodb:BatchWriteItem'
                  - 'dynamodb:DescribeTable'
                Resource:
                  - !ImportValue '{{ project_id }}-{{ software_component }}-langgraph-checkpoints-table-arn'
              - Sid: 'S3CheckpointsAccess'
                Effect: 'Allow'
                Action:
                  - 's3:GetObject'
                  - 's3:PutObject'
                  - 's3:DeleteObject'
                  - 's3:ListBucket'
                  - 's3:PutObjectTagging'
                  - 's3:GetBucketLifecycleConfiguration'
                  - 's3:PutBucketLifecycleConfiguration'
                Resource:
                  - !Sub
                    - '${BucketArn}/*'
                    - BucketArn: !ImportValue '{{ project_id }}-{{ software_component }}-orchestrator-checkpoints-bucket-arn'
                  - !ImportValue '{{ project_id }}-{{ software_component }}-orchestrator-checkpoints-bucket-arn'
              - Sid: 'BedrockInvokeModel'
                Effect: 'Allow'
                Action:
                  - 'bedrock:InvokeModel'
                  - 'bedrock:InvokeModelWithResponseStream'
                Resource:
                  - !Sub 'arn:aws:bedrock:${AWS::Region}:${AWS::AccountId}:inference-profile/*'
                  - 'arn:aws:bedrock:*::foundation-model/*'
      Tags:
        - {Key: 'Name', Value: '{{ env }}-{{ project_id }}-{{ software_component }}-alloy-agent-pod-role'}
        - {Key: 'Project', Value: '{{ project_id }}'}
        - {Key: 'Environment', Value: '{{ env }}'}
        - {Key: 'Version', Value: 'v{{ project_version }}'}
        - {Key: 'Repository', Value: '{{ git_info.repo_name }}'}

  AlloyAgentPodIdentity:
    Type: AWS::EKS::PodIdentityAssociation
    Properties:
      ClusterName: !ImportValue '{{ project_id }}-eks-cluster-name'
      Namespace: 'nannos'
      ServiceAccount: 'alloy-agent'
      RoleArn: !GetAtt AlloyAgentPodRole.Arn

  # ------------------------------------------- Agent Creator Pod IAM Role ------------------------------------------- #
  AgentCreatorPodRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: '{{ env }}-{{ project_id }}-{{ software_component }}-agent-creator-pod-role'
      Description: 'IAM role for Agent Creator pod in EKS (via Pod Identity)'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: 'Allow'
            Principal:
              Service: 'pods.eks.amazonaws.com'
            Action:
              - 'sts:AssumeRole'
              - 'sts:TagSession'
      Policies:
        - PolicyName: '{{ env }}-{{ project_id }}-{{ software_component }}-agent-creator-pod-policy'
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: 'DynamoDBCheckpointsAccess'
                Effect: 'Allow'

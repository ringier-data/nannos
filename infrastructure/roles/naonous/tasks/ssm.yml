

- name: 'upload Naonous OIDC client secret to SSM'
  ringier.aws_cicd.ssm_parameter:
    overwrite_value: 'changed'
    name: '{{ ssmkey_naonous_oidc_client_secret }}'
    description: 'The OIDC client secret for the Naonous component of RC+/Alloy'
    string_type: 'SecureString'
    value: '{{ naonous_oidc_client_secret }}'
    tags:
      Name: '{{ env }}-{{ project_id }}-naonous-oidc-client-secret'
      Project: '{{ project_id }}'
      Environment: '{{ env }}'
      Repository: '{{ git_info.repo_name }}'
      Version: '{{ project_version }}'

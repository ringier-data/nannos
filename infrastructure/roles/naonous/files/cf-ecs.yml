---
AWSTemplateFormatVersion: 2010-09-09
Description: 'RC+/Alloy - Naonous Infrastructure - ECS task and service (v{{ project_version }})'


Conditions:
  IsProd:
    !Equals ['{{ env }}', 'prod']


Resources:

  NaonousEcsExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: '{{ env }}-{{ project_id }}-{{ software_component }}-naonous-ecs-er'
      Description: 'Alloy Naonous Infrastructure ECS task execution role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: 'Allow'
            Principal:
              Service: 'ecs-tasks.amazonaws.com'
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - !ImportValue '{{ project_id }}-common-for-execution-role-arn'
      Policies:
        - PolicyName: 'NaonousTaskExecutionPolicy'
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: 'ECRGetImageNaonous'
                Effect: 'Allow'
                Action:
                  - 'ecr:GetDownloadUrlForLayer'
                  - 'ecr:BatchGetImage'
                  - 'ecr:BatchCheckLayerAvailability'
                Resource: !Sub 'arn:aws:ecr:${AWS::Region}:${AWS::AccountId}:repository/{{ naonous_ecr_repository_name }}'
              - Sid: 'GetNaonousSecrets'
                Effect: 'Allow'
                Action:
                  - 'ssm:GetParameter'
                  - 'ssm:GetParameters'
                Resource:
                  - !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter{{ ssmkey_naonous_oidc_client_secret }}'
      Tags:
        - { Key: 'Name', Value: '{{ env }}-{{ project_id }}-{{ software_component }}-naonous-ecs-execution-role' }
        - { Key: 'Project', Value: '{{ project_id }}' }
        - { Key: 'Environment', Value: '{{ env }}' }
        - { Key: 'Version', Value: 'v{{ project_version }}' }
        - { Key: 'Repository', Value: '{{ git_info.repo_name }}' }

  NaonousEcsTaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: '{{ env }}-{{ project_id }}-{{ software_component }}-naonous-task-role'
      Description: 'Alloy Naonous Infrastructure ECS task role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: 'Allow'
            Principal:
              Service: 'ecs-tasks.amazonaws.com'
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - !ImportValue '{{ project_id }}-common-for-task-role-arn'
      Policies:
        - PolicyName: 'NaonousTaskPolicy'
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: 'DynamoDBCheckpointsAccess'
                Effect: 'Allow'
                Action:
                  - 'dynamodb:Query'
                  - 'dynamodb:GetItem'
                  - 'dynamodb:PutItem'
                  - 'dynamodb:UpdateItem'
                  - 'dynamodb:DeleteItem'
                  - 'dynamodb:BatchGetItem'
                  - 'dynamodb:BatchWriteItem'
                  - 'dynamodb:DescribeTable'
                Resource:
                  - !ImportValue '{{ project_id }}-{{ software_component }}-langgraph-checkpoints-table-arn'

      Tags:
        - { Key: 'Name', Value: '{{ env }}-{{ project_id }}-{{ software_component }}-naonous-task-role' }
        - { Key: 'Project', Value: '{{ project_id }}' }
        - { Key: 'Environment', Value: '{{ env }}' }
        - { Key: 'Version', Value: 'v{{ project_version }}' }
        - { Key: 'Repository', Value: '{{ git_info.repo_name }}' }

  NaonousTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: '{{ env }}-{{ project_id }}-{{ software_component }}-naonous'
      TaskRoleArn: !GetAtt NaonousEcsTaskRole.Arn
      ExecutionRoleArn: !GetAtt NaonousEcsExecutionRole.Arn
      Cpu: '{{ naonous_task_cpu }}'
      Memory: '{{ naonous_task_memory }}'
      NetworkMode: 'awsvpc'
      RequiresCompatibilities: [ 'FARGATE' ]
      RuntimePlatform: { CpuArchitecture : 'ARM64', OperatingSystemFamily: 'LINUX' }
      ContainerDefinitions:
        - Name: '{{ env }}-{{ project_id }}-{{ software_component }}-naonous'
          DependsOn:
            - ContainerName: '{{ project_id }}-logs-router'
              Condition: 'START'
          Image: '{{ naonous_docker_image }}'
          Essential: true
          Interactive: true
          PortMappings:
            - { ContainerPort: '{{ naonous_public_api_port }}', Protocol: 'tcp' }
          LogConfiguration:
            LogDriver: 'awsfirelens'
          Environment:
            - { Name: 'LOG_MODE', Value: 'JSON' }
            - { Name: 'LOG_LEVEL', Value: '{{ log_level }}' }
            - { Name: 'LOG_SET_EXCEPTHOOK', Value: '1' }
            - { Name: 'ENV', Value: '{{ env }}' }
            - { Name: 'AWS_REGION', Value: !Ref 'AWS::Region' }
            - { Name: 'APP_VERSION', Value: 'v{{ project_version }}' }
            - { Name: 'OIDC_ISSUER', Value: '{{ oidc_issuer }}' }
            - { Name: 'OIDC_CLIENT_ID', Value: '{{ naonous_oidc_client_id }}' }
            - { Name: 'AGENT_BASE_URL', Value: 'https://{{ naonous_fqdn }}' }
          Secrets:
            - { Name: 'OIDC_CLIENT_SECRET', ValueFrom: '{{ ssmkey_naonous_oidc_client_secret }}' }
          HealthCheck:
            Command: ['CMD-SHELL', 'python -c "import urllib.request; urllib.request.urlopen(\"http://localhost:{{ naonous_public_api_port }}/.well-known/agent-card.json\").read()" || exit 1']
            Interval: 60
            Retries: 3
            StartPeriod: 60
            Timeout: 5
        # Container 2: Logs Router (FluentBit sidecar)
        - Name: '{{ project_id }}-logs-router'
          Image: !Sub '${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/{{ env }}-{{ project_id }}-devops-fluent-bit-sidecar-v2:latest'
          Essential: true
          Environment:
            - { Name: '_CHANGE_THE_VALUE_TO_FORCE_UPDATE_TASK_', Value: 1 }
            - { Name: 'ENV', Value: '{{ env }}' }
            - { Name: 'SOFTWARE_COMPONENT', Value: '{{ software_component }}' }
            - { Name: 'PROJECT_VERSION', Value: '{{ project_version }}' }
            - { Name: 'REPOSITORY', Value: '{{ git_info.repo_name }}' }
            - { Name: 'ALLOY_TAG', Value: '{{ project_id }}.ecs.{{ software_component }}.{{ env }}-naonous' }
          FirelensConfiguration:
            Type: 'fluentbit'
            Options:
              enable-ecs-log-metadata: false
          LogConfiguration:
            LogDriver: 'awslogs'
            Options:
              awslogs-group: !ImportValue '{{ project_id }}-firelens-fluentbit-loggroup-name'
              awslogs-region: !Sub '${AWS::Region}'
              awslogs-stream-prefix: '{{ software_component }}-naonous'
          HealthCheck:
            Command: ['CMD-SHELL', 'curl -f http://localhost:2020 || exit 1']
            Interval: 30
            Retries: 2
            StartPeriod: 30
            Timeout: 5

  NaonousSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      VpcId: !ImportValue '{{ project_id }}-vpc-id-v2'
      GroupDescription: 'Alloy Naonous Infrastructure security group'
      SecurityGroupIngress:
        - {IpProtocol: 'tcp', FromPort: '{{ naonous_public_api_port }}', ToPort: '{{ naonous_public_api_port }}', CidrIp: !ImportValue '{{ project_id }}-vpc-cidr4', Description: 'Naonous - Local VPC (IPv4)'}
        - {IpProtocol: 'tcp', FromPort: '{{ naonous_public_api_port }}', ToPort: '{{ naonous_public_api_port }}', CidrIpv6: !ImportValue '{{ project_id }}-vpc-cidr6', Description: 'Naonous - Local VPC (IPv6)'}
        - {IpProtocol: 'tcp', FromPort: '{{ naonous_public_api_port }}', ToPort: '{{ naonous_public_api_port }}', CidrIp: !ImportValue '{{ project_id }}-vpn-cidr4', Description: 'Naonous - VPN (IPv4)'}
        - {IpProtocol: 'tcp', FromPort: '{{ naonous_public_api_port }}', ToPort: '{{ naonous_public_api_port }}', CidrIpv6: !ImportValue '{{ project_id }}-vpn-cidr6', Description: 'Naonous - VPN (IPv6)'}
        - {IpProtocol: 'tcp', FromPort: '{{ naonous_public_api_port }}', ToPort: '{{ naonous_public_api_port }}', SourceSecurityGroupId: !ImportValue '{{ project_id }}-public-alb-v2-security-group-id', Description: 'Naonous - LoadBalancer'}
      Tags:
        - { Key: 'Name', Value: '{{ env }}-{{ project_id }}-{{ software_component }}-naonous-sg' }
        - { Key: 'Project', Value: '{{ project_id }}' }
        - { Key: 'Environment', Value: '{{ env }}' }
        - { Key: 'Version', Value: 'v{{ project_version }}' }
        - { Key: 'Repository', Value: '{{ git_info.repo_name }}' }

  NaonousTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      VpcId: !ImportValue '{{ project_id }}-vpc-id-v2'
      HealthCheckEnabled: true
      HealthCheckIntervalSeconds: 30
      HealthCheckPath: '/.well-known/agent-card.json'
      HealthCheckPort: '{{ naonous_public_api_port }}'
      HealthCheckProtocol: 'HTTP'
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Matcher:
        HttpCode: '200'
      Port: '{{ naonous_public_api_port }}'
      Protocol: 'HTTP'
      TargetGroupAttributes:
        - Key: 'deregistration_delay.timeout_seconds'
          Value: !If [IsProd, '30', '0']
        - Key: 'stickiness.enabled'
          Value: false
      TargetType: 'ip'
      Tags:
        - { Key: 'Name', Value: '{{ env }}-{{ project_id }}-{{ software_component }}-naonous' }
        - { Key: 'Project', Value: '{{ project_id }}' }
        - { Key: 'Environment', Value: '{{ env }}' }
        - { Key: 'Version', Value: 'v{{ project_version }}' }
        - { Key: 'Repository', Value: '{{ git_info.repo_name }}' }

  NaonousAlbListenerRule:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      Actions:
        - Type: 'forward'
          TargetGroupArn: !Ref NaonousTargetGroup
      Conditions:
        - Field: 'host-header'
          HostHeaderConfig:
            Values:
              - '{{ naonous_fqdn }}'
      ListenerArn: !ImportValue '{{ project_id }}-public-alb-v2-https-listener'
      # NOTE: The Priority is global and must have unique value across all services we have
      Priority: 603
  
  NaonousService:
    Type: AWS::ECS::Service
    Properties:
      ServiceName: '{{ env }}-{{ project_id }}-{{ software_component }}-naonous'
      Cluster: !ImportValue '{{ project_id }}-shared-ecs-cluster'
      LaunchType: 'FARGATE'
      DeploymentConfiguration:
        MinimumHealthyPercent: 100
        MaximumPercent: 200
      # Do not change DesiredCount. This will cause a re-deployment of the below specified TaskDefinition
      # which we do not want. If you want to update the number of tasks running, edit instead
      # the resource NaonousScalableTarget below.
      DesiredCount: 1 # ! __WARNING__ : See comment above
      TaskDefinition: !Ref NaonousTaskDefinition
      EnableECSManagedTags: true
      EnableExecuteCommand: true
      PropagateTags: 'TASK_DEFINITION'
      HealthCheckGracePeriodSeconds: 300
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: 'DISABLED'
          SecurityGroups:
            - !Ref NaonousSecurityGroup
            - !ImportValue '{{ project_id }}-public-alb-v2-security-group-id'
          Subnets:
            - !ImportValue '{{ project_id }}-subnet-dual-pri1a'
            - !ImportValue '{{ project_id }}-subnet-dual-pri1b'
            - !ImportValue '{{ project_id }}-subnet-dual-pri1c'
      LoadBalancers:
        - TargetGroupArn: !Ref NaonousTargetGroup
          ContainerPort: '{{ naonous_public_api_port }}'
          ContainerName: '{{ env }}-{{ project_id }}-{{ software_component }}-naonous'

  NaonousScalableTarget:
    Type: AWS::ApplicationAutoScaling::ScalableTarget
    Properties:
      MaxCapacity: !If [IsProd, 2, 1]
      MinCapacity: !If [IsProd, 1, 1]
      RoleARN: !GetAtt NaonousEcsAutoScalingRole.Arn
      ServiceNamespace: 'ecs'
      ScalableDimension: 'ecs:service:DesiredCount'
      ResourceId:
        !Sub
          - 'service/${Cluster}/${Name}'
          - Cluster: !ImportValue '{{ project_id }}-shared-ecs-cluster'
            Name: !GetAtt NaonousService.Name

  NaonousEcsAutoScalingPolicyCPU:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Properties:
      PolicyName: '{{ env }}-{{ project_id }}-{{ software_component }}-naonous-target-tracking-cpu50'
      PolicyType: 'TargetTrackingScaling'
      ScalingTargetId: !Ref NaonousScalableTarget
      TargetTrackingScalingPolicyConfiguration:
        TargetValue: 50.0
        ScaleInCooldown: 300
        ScaleOutCooldown: 60
        PredefinedMetricSpecification:
          PredefinedMetricType: 'ECSServiceAverageCPUUtilization'

  NaonousEcsAutoScalingRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: '{{ env }}-{{ project_id }}-{{ software_component }}-naonous-ecs-autoscaling'
      Description: 'Alloy Naonous Infrastructure ECS auto-scaling role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: 'Allow'
            Principal:
              Service: 'ecs.application-autoscaling.amazonaws.com'
            Action: 'sts:AssumeRole'
      Policies:
        - PolicyName: 'AllowCloudwatchAlarms'
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: 'Allow'
                Action:
                  - 'ecs:DescribeServices'
                  - 'ecs:UpdateService'
                  - 'cloudwatch:DeleteAlarms'
                  - 'cloudwatch:DescribeAlarms'
                  - 'cloudwatch:PutMetricAlarm'
                Resource: '*'
              - Effect: 'Allow'
                Action: 'ecs:UpdateService'
                Resource:
                  - !Ref NaonousService
      Tags:
        - { Key: 'Name', Value: '{{ env }}-{{ project_id }}-{{ software_component }}-naonous-ecs-autoscaling-role' }
        - { Key: 'Project', Value: '{{ project_id }}'}
        - { Key: 'Environment', Value: '{{ env }}'}
        - { Key: 'Version', Value: 'v{{ project_version }}'}
        - { Key: 'Repository', Value: '{{ git_info.repo_name }}'}
  
  NaonousCpuUtilizationHighAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: 'NaonousCpuUtilizationHigh'
      AlarmDescription: 'Alloy Naonous - CPUUtilization is higher than 90% for 20 minutes'
      MetricName: 'CPUUtilization'
      Namespace: 'AWS/ECS'
      Dimensions:
        - Name: 'ClusterName'
          Value: !ImportValue '{{ project_id }}-shared-ecs-cluster'
        - Name: 'ServiceName'
          Value: !GetAtt NaonousService.Name
      ComparisonOperator: 'GreaterThanThreshold'
      Statistic: 'Average'
      Threshold: 90
      Period: 1200
      EvaluationPeriods: 1
      TreatMissingData: 'breaching'

  NaonousMemoryUtilizationHighAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: 'NaonousMemoryUtilizationHigh'
      AlarmDescription: 'Alloy Naonous - MemoryUtilization is higher than 90% for 20 minutes'
      MetricName: 'MemoryUtilization'
      Namespace: 'AWS/ECS'
      Dimensions:
        - Name: 'ClusterName'
          Value: !ImportValue '{{ project_id }}-shared-ecs-cluster'
        - Name: 'ServiceName'
          Value: !GetAtt NaonousService.Name
      ComparisonOperator: 'GreaterThanThreshold'
      Statistic: 'Average'
      Threshold: 90
      Period: 1200
      EvaluationPeriods: 1
      TreatMissingData: 'breaching'

  NaonousHealthyHostCountAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: 'NaonousHealthyHostCount'
      AlarmDescription: 'Alloy Naonous - HealthyHostCount is lower than 1 for 1 minute'
      MetricName: 'HealthyHostCount'
      ComparisonOperator: 'LessThanThreshold'
      Namespace: 'AWS/ApplicationELB'
      Dimensions:
        - Name: 'LoadBalancer'
          Value: !ImportValue '{{ project_id }}-public-alb-v2-full-name'
        - Name: 'TargetGroup'
          Value: !GetAtt NaonousTargetGroup.TargetGroupFullName
      Statistic: 'Maximum'
      Threshold: 1
      Period: 60
      EvaluationPeriods: 1
      TreatMissingData: 'breaching'

  NaonousResponsesStatus2xxRatioAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: 'NaonousResponsesStatus2xxRatio'
      AlarmDescription: 'Naonous responses status 2xx ratio'
      ComparisonOperator: 'LessThanThreshold'
      EvaluationPeriods: 1
      DatapointsToAlarm: 1
      Threshold: {{ response_2xx_ratio_threshold }}
      TreatMissingData: '{{ response_2xx_treat_missing_data }}'
      Metrics:
        - Id: ratio
          Label: 'Status 2xx ratio'
          Expression: 'status_2xx_count / requests_count'
          ReturnData: true
        - Id: requests_count
          ReturnData: false
          MetricStat:
            Period: 60
            Stat: 'Sum'
            Unit: 'Count'
            Metric:
              Namespace: 'AWS/ApplicationELB'
              MetricName: 'RequestCount'
              Dimensions:
                - Name: 'LoadBalancer'
                  Value: !ImportValue '{{ project_id }}-public-alb-v2-full-name'
                - Name: 'TargetGroup'
                  Value: !GetAtt NaonousTargetGroup.TargetGroupFullName
        - Id: status_2xx_count
          ReturnData: false
          MetricStat:
            Period: 60
            Stat: 'Sum'
            Unit: 'Count'
            Metric:
              Namespace: 'AWS/ApplicationELB'
              MetricName: 'HTTPCode_Target_2XX_Count'
              Dimensions:
                - Name: 'LoadBalancer'
                  Value: !ImportValue '{{ project_id }}-public-alb-v2-full-name'
                - Name: 'TargetGroup'
                  Value: !GetAtt NaonousTargetGroup.TargetGroupFullName

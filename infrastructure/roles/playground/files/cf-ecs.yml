---
AWSTemplateFormatVersion: 2010-09-09
Description: 'RC+/Alloy - ChatUI Infrastructure - ECS task and service (v{{ project_version }})'


Conditions:
  IsProd:
    !Equals ['{{ env }}', 'prod']


Resources:

  ChatUIEcsExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: '{{ env }}-{{ project_id }}-{{ software_component }}-chat-ui-ecs-execution-role'
      Description: 'Alloy ChatUI Infrastructure ECS task execution role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: 'Allow'
            Principal:
              Service: 'ecs-tasks.amazonaws.com'
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - !ImportValue '{{ project_id }}-common-for-execution-role-arn'
      Policies:
        - PolicyName: 'ChatUITaskExecutionPolicy'
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: 'ECRGetImageChatUI'
                Effect: 'Allow'
                Action:
                  - 'ecr:GetDownloadUrlForLayer'
                  - 'ecr:BatchGetImage'
                  - 'ecr:BatchCheckLayerAvailability'
                Resource: !Sub 'arn:aws:ecr:${AWS::Region}:${AWS::AccountId}:repository/{{ chat_ui_ecr_repository_name }}'
              - Sid: 'GetOrchestratorSecrets'
                Effect: 'Allow'
                Action:
                  - 'ssm:GetParameter'
                  - 'ssm:GetParameters'
                Resource:
                  - !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter{{ ssmkey_chat_ui_oidc_client_secret }}'
                  - !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter{{ ssmkey_chat_ui_secret_key }}'
                  - !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter{{ ssmkey_rds_service_password }}'
                  - !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter{{ ssmkey_keycloak_admin_client_secret }}'
              - Sid: "GetProjectSsmParams"
                Effect: "Allow"
                Action:
                  - "ssm:DescribeParameters"
                  - "ssm:GetParameter"
                  - "ssm:GetParameters"
                Resource:
                  - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/{{ project_id }}/{{ software_component }}/*"
                  - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/{{ project_id }}/rds-ca"
      Tags:
        - { Key: 'Name', Value: '{{ env }}-{{ project_id }}-{{ software_component }}-chat-ui-ecs-execution-role' }
        - { Key: 'Project', Value: '{{ project_id }}' }
        - { Key: 'Environment', Value: '{{ env }}' }
        - { Key: 'Version', Value: 'v{{ project_version }}' }
        - { Key: 'Repository', Value: '{{ git_info.repo_name }}' }

  ChatUIEcsTaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: '{{ env }}-{{ project_id }}-{{ software_component }}-chat-ui-task-role'
      Description: 'Alloy ChatUI Infrastructure ECS task role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: 'Allow'
            Principal:
              Service: 'ecs-tasks.amazonaws.com'
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - !ImportValue '{{ project_id }}-common-for-task-role-arn'
      Policies:
        - PolicyName: 'ChatUITaskPolicy'
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: 'DynamoDBSessionsTableAccess'
                Effect: 'Allow'
                Action:
                  - 'dynamodb:Query'
                  - 'dynamodb:GetItem'
                  - 'dynamodb:PutItem'
                  - 'dynamodb:UpdateItem'
                  - 'dynamodb:DeleteItem'
                  - 'dynamodb:BatchGetItem'
                  - 'dynamodb:BatchWriteItem'
                  - 'dynamodb:DescribeTable'
                Resource:
                  - !ImportValue '{{ project_id }}-{{ software_component }}-chat-ui-sessions-table-arn'
              - Sid: 'DynamoDBConversationsTableAccess'
                Effect: 'Allow'
                Action:
                  - 'dynamodb:Query'
                  - 'dynamodb:GetItem'
                  - 'dynamodb:PutItem'
                  - 'dynamodb:UpdateItem'
                  - 'dynamodb:DeleteItem'
                  - 'dynamodb:BatchGetItem'
                  - 'dynamodb:BatchWriteItem'
                  - 'dynamodb:DescribeTable'
                Resource:
                  - !ImportValue '{{ project_id }}-{{ software_component }}-chat-ui-conversations-table-arn'
              - Sid: 'DynamoDBMessagesTableAccess'
                Effect: 'Allow'
                Action:
                  - 'dynamodb:Query'
                  - 'dynamodb:GetItem'
                  - 'dynamodb:PutItem'
                  - 'dynamodb:UpdateItem'
                  - 'dynamodb:DeleteItem'
                  - 'dynamodb:BatchGetItem'
                  - 'dynamodb:BatchWriteItem'
                  - 'dynamodb:DescribeTable'
                Resource:
                  - !ImportValue '{{ project_id }}-{{ software_component }}-chat-ui-messages-table-arn'
              - Sid: 'S3FilesFullAccess'
                Effect: 'Allow'
                Action:
                  - 's3:PutObject'
                  - 's3:GetObject'
                  - 's3:DeleteObject'
                  - 's3:ListBucket'
                Resource:
                  - !Sub
                    - '${BucketArn}/*'
                    - BucketArn: !ImportValue '{{ project_id }}-{{ software_component }}-files-bucket-arn'
                  - !ImportValue '{{ project_id }}-{{ software_component }}-files-bucket-arn'
              - Sid: 'ReadWriteVaultSecrets'
                Effect: 'Allow'
                Action:
                  - 'ssm:GetParameter'
                  - 'ssm:GetParameters'
                  - 'ssm:PutParameter'
                  - 'ssm:AddTagsToResource'
                Resource:
                  - !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter{{ ssmkey_vault_prefix }}*'
              - Sid: 'DecryptionEncryptionUsingKmsKey'
                Effect: 'Allow'
                Action:
                  - 'kms:DescribeKey'
                  - 'kms:GenerateDataKey'
                  - 'kms:Decrypt'
                  - 'kms:Encrypt'
                Resource: !ImportValue '{{ project_id }}-sensitive-data-kms-key-arn'
      Tags:
        - { Key: 'Name', Value: '{{ env }}-{{ project_id }}-{{ software_component }}-chat-ui-task-role' }
        - { Key: 'Project', Value: '{{ project_id }}' }
        - { Key: 'Environment', Value: '{{ env }}' }
        - { Key: 'Version', Value: 'v{{ project_version }}' }
        - { Key: 'Repository', Value: '{{ git_info.repo_name }}' }

  # CloudWatch Logs Group for Chat UI
  ChatUILogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/ecs/{{ env }}-{{ project_id }}-{{ software_component }}-chat-ui'
      RetentionInDays: !If [IsProd, 30, 7]
      Tags:
        - { Key: 'Name', Value: '{{ env }}-{{ project_id }}-{{ software_component }}-chat-ui-logs' }
        - { Key: 'Project', Value: '{{ project_id }}' }
        - { Key: 'Environment', Value: '{{ env }}' }
        - { Key: 'Version', Value: 'v{{ project_version }}' }
        - { Key: 'Repository', Value: '{{ git_info.repo_name }}' }

  ChatUITaskDefinition:
    Type: AWS::ECS::TaskDefinition
    DependsOn: ChatUILogGroup
    Properties:
      Family: '{{ env }}-{{ project_id }}-{{ software_component }}-chat-ui'
      TaskRoleArn: !GetAtt ChatUIEcsTaskRole.Arn
      ExecutionRoleArn: !GetAtt ChatUIEcsExecutionRole.Arn
      Cpu: '{{ chat_ui_task_cpu }}'
      Memory: '{{ chat_ui_task_memory }}'
      NetworkMode: 'awsvpc'
      RequiresCompatibilities: [ 'FARGATE' ]
      RuntimePlatform: { CpuArchitecture : 'ARM64', OperatingSystemFamily: 'LINUX' }
      ContainerDefinitions:
        - Name: '{{ env }}-{{ project_id }}-{{ software_component }}-chat-ui'
          Image: '{{ chat_ui_docker_image }}'
          Essential: true
          Interactive: true
          PortMappings:
            - { ContainerPort: '{{ chat_ui_public_api_port }}', Protocol: 'tcp' }
          Environment:
            - { Name: "ENVIRONMENT", Value: "{{ env }}" }
            - { Name: "VERSION", Value: "{{ project_version }}" }
            - { Name: "SOFTWARE_COMPONENT", Value: "{{ software_component }}" }
            - { Name: "PROJECT_ID", Value: "{{ project_id }}" }
            - { Name: "REPOSITORY", Value: "{{ git_info.repo_name }}" }
            - { Name: "DYNAMODB_SESSIONS_TABLE", Value: !ImportValue '{{ project_id }}-{{ software_component }}-chat-ui-sessions-table-name' }
            - { Name: "DYNAMODB_CONVERSATIONS_TABLE", Value: !ImportValue '{{ project_id }}-{{ software_component }}-chat-ui-conversations-table-name' }
            - { Name: "DYNAMODB_MESSAGES_TABLE", Value: !ImportValue '{{ project_id }}-{{ software_component }}-chat-ui-messages-table-name' }
            - { Name: "API_PORT", Value: "{{ chat_ui_public_api_port }}" }
            - { Name: "OIDC_CLIENT_ID", Value: '{{ oidc_client_id }}' }
            - { Name: "OIDC_ISSUER", Value: '{{ oidc_issuer }}' }
            - { Name: "BASE_DOMAIN", Value: '{{ chat_ui_fqdn }}' }
            - { Name: "ORCHESTRATOR_BASE_DOMAIN", Value: '{{ orchestrator_agent_fqdn }}' }
            - { Name: "VITE_ORCHESTRATOR_BASE_DOMAIN", Value: '{{ orchestrator_agent_fqdn }}' }
            - { Name: "ORCHESTRATOR_CLIENT_ID", Value: '{{ orchestrator_oidc_client_id }}' }
            - {
                Name: POSTGRES_HOST,
                Value: !ImportValue "{{ project_id }}-{{ software_component }}-rds-endpoint-address",
              }
            - { Name: POSTGRES_PORT, Value: "{{ rds_port }}" }
            - { Name: POSTGRES_DB, Value: "{{ rds_db_name }}" }
            - { Name: POSTGRES_USER, Value: "{{ rds_service_username }}" }
            - { Name: POSTGRES_SCHEMA, Value: "{{ rds_schema }}" }
            - { Name: POSTGRES_USE_SSL, Value: "true" }
            - { Name: POSTGRES_VERIFY_SSL, Value: "true" }
            - { Name: "SSM_VAULT_PREFIX", Value: '{{ ssmkey_vault_prefix }}' }
            - { Name: "KMS_VAULT_KEY_ID", Value: !ImportValue '{{ project_id }}-sensitive-data-kms-key-alias' }
            - { Name: "KEYCLOAK_ADMIN_CLIENT_ID", Value: '{{ keycloak_admin_client_id }}' }
            - { Name: "KEYCLOAK_GROUP_NAME_PREFIX", Value: '{{ keycloak_group_name_prefix }}' }
          Secrets:
            - { Name: "OIDC_CLIENT_SECRET", ValueFrom: '{{ ssmkey_chat_ui_oidc_client_secret }}' }
            - { Name: "SECRET_KEY", ValueFrom: '{{ ssmkey_chat_ui_secret_key }}' }
            - { Name: "POSTGRES_PASSWORD", ValueFrom: '{{ ssmkey_rds_service_password }}' }
            - { Name: "KEYCLOAK_ADMIN_CLIENT_SECRET", ValueFrom: '{{ ssmkey_keycloak_admin_client_secret }}' }
            - {
                Name: "POSTGRES_SSL_CA",
                ValueFrom: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/{{ project_id }}/rds-ca",
              }
          LogConfiguration:
            LogDriver: 'awslogs'
            Options:
              awslogs-group: !Sub '/ecs/{{ env }}-{{ project_id }}-{{ software_component }}-chat-ui'
              awslogs-region: !Ref 'AWS::Region'
              awslogs-stream-prefix: 'ecs'
          HealthCheck:
            Command: ['CMD-SHELL', 'python -c "import urllib.request; urllib.request.urlopen(\"http://localhost:8080/api/v1/health\").read()" || exit 1']
            Interval: 60
            Retries: 3
            StartPeriod: 30
            Timeout: 5

  ChatUITargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      VpcId: !ImportValue '{{ project_id }}-vpc-id-v2'
      HealthCheckEnabled: true
      HealthCheckIntervalSeconds: 30
      HealthCheckPath: '/api/v1/health'
      HealthCheckPort: '{{ chat_ui_public_api_port }}'
      HealthCheckProtocol: 'HTTP'
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Matcher:
        HttpCode: '200'
      Port: '{{ chat_ui_public_api_port }}'
      Protocol: 'HTTP'
      TargetGroupAttributes:
        - Key: 'deregistration_delay.timeout_seconds'
          Value: !If [IsProd, '30', '0']
        # NOTE: Enable stickiness to maintain session affinity for WebSocket connections
        - Key: 'stickiness.enabled'
          Value: 'true'
        - Key: 'stickiness.type'
          Value: 'lb_cookie'
        - Key: 'stickiness.lb_cookie.duration_seconds'
          Value: '3600'  # 1 hour sticky session duration
      TargetType: 'ip'
      Tags:
        - { Key: 'Name', Value: '{{ env }}-{{ project_id }}-{{ software_component }}-chat-ui' }
        - { Key: 'Project', Value: '{{ project_id }}' }
        - { Key: 'Environment', Value: '{{ env }}' }
        - { Key: 'Version', Value: 'v{{ project_version }}' }
        - { Key: 'Repository', Value: '{{ git_info.repo_name }}' }

  ChatUIAlbListenerRule:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      Actions:
        - Type: 'forward'
          TargetGroupArn: !Ref ChatUITargetGroup
      Conditions:
        - Field: 'host-header'
          HostHeaderConfig:
            Values:
              - '{{ chat_ui_fqdn }}'
      ListenerArn: !ImportValue '{{ project_id }}-public-alb-v2-https-listener'
      # NOTE: The Priority is global and must have unique value across all services we have
      Priority: 602

  ChatUISecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      VpcId: !ImportValue '{{ project_id }}-vpc-id-v2'
      GroupDescription: 'Chat UI Infrastructure security group'
      SecurityGroupIngress:
        - {IpProtocol: 'tcp', FromPort: '{{ chat_ui_public_api_port }}', ToPort: '{{ chat_ui_public_api_port }}', CidrIp: !ImportValue '{{ project_id }}-vpc-cidr4', Description: 'Chat UI - Local VPC (IPv4)'}
        - {IpProtocol: 'tcp', FromPort: '{{ chat_ui_public_api_port }}', ToPort: '{{ chat_ui_public_api_port }}', CidrIpv6: !ImportValue '{{ project_id }}-vpc-cidr6', Description: 'Chat UI - Local VPC (IPv6)'}
        - {IpProtocol: 'tcp', FromPort: '{{ chat_ui_public_api_port }}', ToPort: '{{ chat_ui_public_api_port }}', CidrIp: !ImportValue '{{ project_id }}-vpn-cidr4', Description: 'Chat UI - VPN (IPv4)'}
        - {IpProtocol: 'tcp', FromPort: '{{ chat_ui_public_api_port }}', ToPort: '{{ chat_ui_public_api_port }}', CidrIpv6: !ImportValue '{{ project_id }}-vpn-cidr6', Description: 'Chat UI - VPN (IPv6)'}
        - {IpProtocol: 'tcp', FromPort: '{{ chat_ui_public_api_port }}', ToPort: '{{ chat_ui_public_api_port }}', SourceSecurityGroupId: !ImportValue '{{ project_id }}-public-alb-v2-security-group-id', Description: 'Chat UI - LoadBalancer'}
      Tags:
        - { Key: 'Name', Value: '{{ env }}-{{ project_id }}-{{ software_component }}-chat-ui-sg' }
        - { Key: 'Project', Value: '{{ project_id }}' }
        - { Key: 'Environment', Value: '{{ env }}' }
        - { Key: 'Version', Value: 'v{{ project_version }}' }
        - { Key: 'Repository', Value: '{{ git_info.repo_name }}' }

  ChatUIService:
    Type: AWS::ECS::Service
    Properties:
      ServiceName: '{{ env }}-{{ project_id }}-{{ software_component }}-chat-ui'
      Cluster: !ImportValue '{{ project_id }}-shared-ecs-cluster'
      LaunchType: 'FARGATE'
      DeploymentConfiguration:
        MinimumHealthyPercent: 100
        MaximumPercent: 200
      # Do not change DesiredCount. This will cause a re-deployment of the below specified TaskDefinition
      # which we do not want. If you want to update the number of tasks running, edit instead
      # the resource ChatUIScalableTarget below.
      DesiredCount: 1 # ! __WARNING__ : See comment above
      TaskDefinition: !Ref ChatUITaskDefinition
      EnableECSManagedTags: true
      EnableExecuteCommand: true
      PropagateTags: 'TASK_DEFINITION'
      HealthCheckGracePeriodSeconds: 300
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: 'DISABLED'
          SecurityGroups:
            - !Ref ChatUISecurityGroup
            - !ImportValue '{{ project_id }}-public-alb-v2-security-group-id'
          Subnets:
            - !ImportValue '{{ project_id }}-subnet-dual-pri1a'
            - !ImportValue '{{ project_id }}-subnet-dual-pri1b'
            - !ImportValue '{{ project_id }}-subnet-dual-pri1c'
      LoadBalancers:
        - TargetGroupArn: !Ref ChatUITargetGroup
          ContainerPort: '{{ chat_ui_public_api_port }}'
          ContainerName: '{{ env }}-{{ project_id }}-{{ software_component }}-chat-ui'

  ChatUIEcsAutoScalingRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: '{{ env }}-{{ project_id }}-{{ software_component }}-chat-ui-ecs-autoscaling'
      Description: 'Alloy Chat UI Infrastructure ECS auto-scaling role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: 'Allow'
            Principal:
              Service: 'ecs.application-autoscaling.amazonaws.com'
            Action: 'sts:AssumeRole'
      Policies:
        - PolicyName: 'AllowCloudwatchAlarms'
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: 'Allow'
                Action:
                  - 'ecs:DescribeServices'
                  - 'ecs:UpdateService'
                  - 'cloudwatch:DeleteAlarms'
                  - 'cloudwatch:DescribeAlarms'
                  - 'cloudwatch:PutMetricAlarm'
                Resource: '*'
              - Effect: 'Allow'
                Action: 'ecs:UpdateService'
                Resource:
                  - !Ref ChatUIService
      Tags:
        - { Key: 'Name', Value: '{{ env }}-{{ project_id }}-{{ software_component }}-chat-ui-ecs-autoscaling-role' }
        - { Key: 'Project', Value: '{{ project_id }}'}
        - { Key: 'Environment', Value: '{{ env }}'}
        - { Key: 'Version', Value: 'v{{ project_version }}'}
        - { Key: 'Repository', Value: '{{ git_info.repo_name }}'}

  ChatUIScalableTarget:
    Type: AWS::ApplicationAutoScaling::ScalableTarget
    Properties:
      MaxCapacity: !If [IsProd, 2, 1]
      MinCapacity: !If [IsProd, 1, 1]
      RoleARN: !GetAtt ChatUIEcsAutoScalingRole.Arn
      ServiceNamespace: 'ecs'
      ScalableDimension: 'ecs:service:DesiredCount'
      ResourceId:
        !Sub
          - 'service/${Cluster}/${Name}'
          - Cluster: !ImportValue '{{ project_id }}-shared-ecs-cluster'
            Name: !GetAtt ChatUIService.Name

  ChatUIEcsAutoScalingPolicyCPU:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Properties:
      PolicyName: '{{ env }}-{{ project_id }}-{{ software_component }}-chat-ui-target-tracking-cpu50'
      PolicyType: 'TargetTrackingScaling'
      ScalingTargetId: !Ref ChatUIScalableTarget
      TargetTrackingScalingPolicyConfiguration:
        TargetValue: 50.0
        ScaleInCooldown: 300
        ScaleOutCooldown: 60
        PredefinedMetricSpecification:
          PredefinedMetricType: 'ECSServiceAverageCPUUtilization'

  ChatUICpuUtilizationHighAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: 'ChatUICpuUtilizationHigh'
      AlarmDescription: 'Alloy Chat UI - CPUUtilization is higher than 90% for 20 minutes'
      MetricName: 'CPUUtilization'
      Namespace: 'AWS/ECS'
      Dimensions:
        - Name: 'ClusterName'
          Value: !ImportValue '{{ project_id }}-shared-ecs-cluster'
        - Name: 'ServiceName'
          Value: !GetAtt ChatUIService.Name
      ComparisonOperator: 'GreaterThanThreshold'
      Statistic: 'Average'
      Threshold: 90
      Period: 1200
      EvaluationPeriods: 1
      TreatMissingData: 'breaching'

  ChatUIMemoryUtilizationHighAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: 'ChatUIMemoryUtilizationHigh'
      AlarmDescription: 'Alloy Chat UI - MemoryUtilization is higher than 90% for 20 minutes'
      MetricName: 'MemoryUtilization'
      Namespace: 'AWS/ECS'
      Dimensions:
        - Name: 'ClusterName'
          Value: !ImportValue '{{ project_id }}-shared-ecs-cluster'
        - Name: 'ServiceName'
          Value: !GetAtt ChatUIService.Name
      ComparisonOperator: 'GreaterThanThreshold'
      Statistic: 'Average'
      Threshold: 90
      Period: 1200
      EvaluationPeriods: 1
      TreatMissingData: 'breaching'

  ChatUIHealthyHostCountAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: 'ChatUIHealthyHostCount'
      AlarmDescription: 'Alloy Chat UI - HealthyHostCount is lower than 1 for 1 minute'
      MetricName: 'HealthyHostCount'
      ComparisonOperator: 'LessThanThreshold'
      Namespace: 'AWS/ApplicationELB'
      Dimensions:
        - Name: 'LoadBalancer'
          Value: !ImportValue '{{ project_id }}-public-alb-v2-full-name'
        - Name: 'TargetGroup'
          Value: !GetAtt ChatUITargetGroup.TargetGroupFullName
      Statistic: 'Maximum'
      Threshold: 1
      Period: 60
      EvaluationPeriods: 1
      TreatMissingData: 'breaching'

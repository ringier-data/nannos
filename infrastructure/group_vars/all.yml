# == RDS ==
preferred_maintenance_window: "mon:04:00-mon:06:00"
rds_schema: "{{ project_id }}"
rds_db_name: "{{ project_id }}"
rds_storage_size: 30 # gb
rds_port: 5432

ssmkey_rds_master_password: "/{{ project_id }}/{{ software_component }}/rds-master-password"
ssmkey_rds_master_username: "/{{ project_id }}/{{ software_component }}/rds-master-username"

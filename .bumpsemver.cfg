[bumpsemver]
current_version = 0.6.0
commit = True
tag = False
tag_name = v{new_version}

[bumpsemver:plaintext:README.md]
search = Current version: **v{current_version}**
replace = Current version: **v{new_version}**

[bumpsemver:yaml:infrastructure/playbook.yml]
yamlpath = [0].vars.project_version

[bumpsemver:toml:app/agent-creator/pyproject.toml]
tomlpath = project.version

[bumpsemver:toml:app/alloy-agent/pyproject.toml]
tomlpath = project.version

[bumpsemver:toml:app/orchestrator-agent/pyproject.toml]
tomlpath = project.version

[bumpsemver:toml:app/playground-backend/pyproject.toml]
tomlpath = project.version

[bumpsemver:toml:app/ringier-a2a-sdk/pyproject.toml]
tomlpath = project.version

[bumpsemver:json:app/playground-frontend/package.json]
jsonpath = version

[bumpsemver:json(1):app/playground-frontend/package-lock.json]
jsonpath = version

[bumpsemver:json(2):app/playground-frontend/package-lock.json]
jsonpath = packages[""].version

[bumpsemver:plaintext:app/agent-creator/uv.lock]
search = 
	name = "agent-creator-a2a-server"
	version = "{current_version}"
replace = 
	name = "agent-creator-a2a-server"
	version = "{new_version}"

[bumpsemver:plaintext(sdk):app/agent-creator/uv.lock]
search = 
	name = "ringier-a2a-sdk"
	version = "{current_version}"

[project]
name = "object-storage"
version = "0.1.0"
description = "Pluggable object storage abstraction (S3, S3-compatible, local filesystem)"
requires-python = ">=3.12"
dependencies = []

[project.optional-dependencies]
s3 = [
    "aiobotocore>=2.15.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.uv.sources]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24.0",
    "moto[s3]>=5.0.0",
    "object-storage[s3]",
]

version: 1
disable_existing_loggers: False
formatters:
  default:
    "()": "rcplus_alloy_common.logging.CustomJsonFormatter"
    fmt: "%(asctime)s %(levelname)s %(name)s %(message)s"
    rename_fields:
      levelname: level
      asctime: time
    # Drop uvicorn's ANSI-colored duplicate of the message from the JSON output.
    reserved_attrs: &reserved_attrs
      - args
      - asctime
      - created
      - exc_info
      - exc_text
      - filename
      - funcName
      - levelname
      - levelno
      - lineno
      - message
      - module
      - msecs
      - msg
      - name
      - pathname
      - process
      - processName
      - relativeCreated
      - stack_info
      - taskName
      - thread
      - threadName
      - color_message
  access:
    "()": "rcplus_alloy_common.logging.CustomJsonFormatter"
    fmt: "%(asctime)s %(levelname)s %(name)s %(message)s"
    rename_fields:
      levelname: level
      asctime: time
    reserved_attrs: *reserved_attrs
handlers:
  default:
    formatter: default
    class: logging.StreamHandler
    stream: ext://sys.stderr
  access:
    formatter: access
    class: logging.StreamHandler
    stream: ext://sys.stdout
loggers:
  uvicorn:
    handlers:
      - default
    level: INFO
    propagate: False
  uvicorn.error:
    level: INFO
  uvicorn.access:
    handlers:
      - access
    level: INFO
    propagate: False

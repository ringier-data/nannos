[project]
name = "voice-agent"
version = "0.10.0"
description = "Voice agent powered by Gemini Live native audio (single-model STT+LLM+TTS)"
requires-python = ">=3.13"
dependencies = [
    "fastapi>=0.115.0",
    "uvicorn>=0.38.0",
    "google-genai>=1.0.0",
    "google-auth>=2.0.0",
    "python-dotenv>=1.1.0",
    "pydantic>=2.10.0",
    "audioop-lts>=0.2.1",
    "numpy>=2.4.3",
    "twilio>=9.0",
    "a2a-sdk[http-server]>=0.3.9",
    "ringier-a2a-sdk[langgraph]>=0.7.0",
    "mcp>=1.0.0",
    "langsmith>=0.2.0",
    "pytz>=2025.2",
    "rcplus-alloy-common>=8.11.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.3.0",
    "pytest-asyncio>=0.25.0",
    "websockets>=12.0",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.setuptools.packages.find]
include = ["voice_agent*"]

[tool.uv.sources]
ringier-a2a-sdk = { path = "../ringier-a2a-sdk", editable = true }

[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[dependency-groups]
dev = [
    "sounddevice>=0.5.5",
    "pytest>=8.3.0",
    "pytest-asyncio>=0.25.0",
    "websockets>=12.0",
    "debugpy>=1.8.20",
]

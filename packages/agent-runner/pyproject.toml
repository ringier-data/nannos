[project]
name = "agent-runner"
version = "0.15.0"
description = "Internal execution service for scheduled automated sub-agent jobs"
requires-python = ">=3.12"
dependencies = [
    # A2A server
    "a2a-sdk[http-server]>=0.3.25,<1.0.0",
    "click>=8.1.8",
    # HTTP server
    "uvicorn>=0.38.0",
    # LangChain / DeepAgents
    "deepagents>=0.4.10,<0.5.0",
    "langchain>=1.0.0",
    "langchain-aws>=1.4.3",
    "langchain-mcp-adapters>=0.1.11",
    # LangGraph with AWS checkpointing
    "langgraph>=1.1.0",
    "langgraph-checkpoint-aws>=1.0.1",
    # LangGraph PostgreSQL store (pgvector)
    "langgraph-checkpoint-postgres>=2.0.11",
    "psycopg>=3.2.0",
    "psycopg-binary>=3.2.0",
    "psycopg-pool>=3.2.0",
    # HTTP client
    "httpx>=0.28.1",
    # Watch condition evaluation
    "jsonpath-ng>=1.6.0",
    # Data models
    "pydantic>=2.10.6",
    # Shared SDKs
    "rcplus-alloy-common>=8.6.1",
    "ringier-a2a-sdk>=0.1.0",
    "agent-common[all]>=0.1.0",
    # Utilities
    "python-dotenv>=1.1.0",
    "pyyaml>=6.0.2",
    # LangSmith tracing
    "langsmith>=0.3.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.3.4",
    "pytest-asyncio>=0.25.2",
    "pytest-cov>=6.0.0",
    "ruff>=0.8.6",
    "mypy>=1.15.0",
]

[tool.uv.sources]
ringier-a2a-sdk = { path = "../ringier-a2a-sdk", editable = true }
agent-common = { path = "../agent-common", editable = true }
object-storage = { path = "../object-storage", editable = true }

[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[dependency-groups]
dev = [
    "debugpy>=1.8.20",
    "pytest-asyncio>=1.3.0",
]

[tool.ruff]
line-length = 120
target-version = "py312"

[tool.ruff.lint]
select = ["E", "W", "F", "I", "B", "C4", "UP"]
ignore = ["E501", "B008"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"

[tool.mypy]
python_version = "3.12"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true

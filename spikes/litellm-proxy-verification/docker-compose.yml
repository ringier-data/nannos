# Throwaway spike stack: LiteLLM proxy + Postgres (SpendLogs) + mock upstream.
# PIN the litellm image (see README) — Check 2's result is version-specific.

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: litellm
      POSTGRES_PASSWORD: litellm
      POSTGRES_DB: litellm
    ports:
      - "5440:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U litellm"]
      interval: 3s
      timeout: 3s
      retries: 20

  mock-upstream:
    image: ghcr.io/astral-sh/uv:python3.12-bookworm-slim
    working_dir: /app
    volumes:
      - ./mock_upstream.py:/app/mock_upstream.py:ro
    environment:
      FIRST_TOKEN_DELAY_S: "30"
      INTER_CHUNK_STALL_S: "30"
    command: ["uv", "run", "--with", "starlette", "--with", "uvicorn", "mock_upstream.py"]
    expose:
      - "8090"

  litellm:
    image: ghcr.io/berriai/litellm:main-stable   # <-- PIN ME (record digest in README)
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "4000:4000"
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./custom_logger.py:/app/custom_logger.py:ro
      - ./captured:/captured
    environment:
      LITELLM_MASTER_KEY: "sk-spike-master"
      DATABASE_URL: "postgresql://litellm:litellm@postgres:5432/litellm"
      SPIKE_CAPTURE_PATH: "/captured/events.jsonl"
      PYTHONPATH: "/app"
      # AWS creds for Bedrock — passed through from your shell (or set AWS_PROFILE + mount ~/.aws)
      AWS_BEDROCK_REGION: ${AWS_BEDROCK_REGION:-eu-west-1}
      AWS_REGION: ${AWS_BEDROCK_REGION:-eu-west-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
    # PYTHONPATH so `callbacks: custom_logger.proxy_handler_instance` resolves
    command:
      - "--config=/app/config.yaml"
      - "--port=4000"
      - "--detailed_debug"
    working_dir: /app

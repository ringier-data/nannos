---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: voice-agent
  labels:
    app: voice-agent
    app.kubernetes.io/part-of: nannos
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: voice-agent
  labels:
    app: voice-agent
    app.kubernetes.io/part-of: nannos
spec:
  replicas: 1
  selector:
    matchLabels:
      app: voice-agent
  template:
    metadata:
      labels:
        app: voice-agent
    spec:
      serviceAccountName: voice-agent
      containers:
      - name: voice-agent
        ports:
        - containerPort: 8080
        env:
        - name: HOST
          value: "0.0.0.0"
        - name: PORT
          value: "8080"
        - name: LOG_MODE
          value: "JSON"
        - name: LOG_LEVEL
          value: "INFO"
        - name: LOG_SET_EXCEPTHOOK
          value: "1"
        - name: OIDC_ISSUER
          value: "https://login.my-issuer.com/realms/nannos"
        - name: OIDC_CLIENT_ID
          value: "voice-agent"
        - name: AGENT_CLIENT_ID
          value: "voice-agent"
        - name: AGENT_BASE_URL
          value: "https://voice-agent.${BASE_DOMAIN}"
        - name: VOICE_AGENT_BASE_URL
          value: "https://voice-agent.${BASE_DOMAIN}"
        - name: PLAYGROUND_BACKEND_URL
          value: "https://console.${BASE_DOMAIN}"
        - name: GCP_PROJECT_ID
          value: "YOUR_GCP_PROJECT_ID"
        - name: GCP_LOCATION
          value: "europe-west1"
        - name: CALL_TIMEOUT_SECONDS
          value: "60"
        - name: TWILIO_REGION
          value: "ie1"
        - name: TWILIO_EDGE
          value: "dublin"
        - name: MCP_GATEWAY_URL
          value: "https://YOUR_ORG_ID.gatana.ai/mcp"
        - name: MCP_TIMEOUT_SECONDS
          value: "60"
        - name: LANGSMITH_TRACING
          value: "true"
        - name: LANGSMITH_ENDPOINT
          value: "https://eu.api.smith.langchain.com"
        - name: LANGSMITH_PROJECT
          value: "${ENV}-nannos-agent-framework"
        envFrom:
        - secretRef:
            name: voice-agent-secrets
        livenessProbe:
          httpGet:
            path: /.well-known/agent-card.json
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 60
        readinessProbe:
          httpGet:
            path: /.well-known/agent-card.json
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: voice-agent
  labels:
    app: voice-agent
    app.kubernetes.io/part-of: nannos
spec:
  selector:
    app: voice-agent
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP

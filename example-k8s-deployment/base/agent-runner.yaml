---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: agent-runner
  labels:
    app: agent-runner
    app.kubernetes.io/part-of: nannos
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-runner
  labels:
    app: agent-runner
    app.kubernetes.io/part-of: nannos
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agent-runner
  template:
    metadata:
      labels:
        app: agent-runner
    spec:
      serviceAccountName: agent-runner
      containers:
      - name: agent-runner
        ports:
        - containerPort: 8080
        env:
        - name: API_PORT
          value: "8080"
        - name: LOG_MODE
          value: "JSON"
        - name: LOG_LEVEL
          value: "INFO"
        - name: LOG_SET_EXCEPTHOOK
          value: "1"
        - name: OIDC_CLIENT_ID
          value: "agent-runner"
        - name: OIDC_ISSUER
          value: "https://login.my-issuer.com/realms/nannos"
        - name: AGENT_BASE_URL
          value: "https://agent-runner.${BASE_DOMAIN}"
        - name: CONSOLE_BACKEND_URL
          value: "https://console.${BASE_DOMAIN}"
        - name: MCP_GATEWAY_URL
          value: "https://YOUR_ORG_ID.gatana.ai/mcp"
        - name: POSTGRES_HOST
          value: "${POSTGRES_HOST}"
        - name: POSTGRES_PORT
          value: "5432"
        - name: POSTGRES_DB
          value: "nannos"
        - name: POSTGRES_USER
          value: "docstore"
        - name: POSTGRES_SCHEMA
          value: "docstore"
        envFrom:
        - secretRef:
            name: agent-runner-secrets
        livenessProbe:
          httpGet:
            path: /.well-known/agent-card.json
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 60
        readinessProbe:
          httpGet:
            path: /.well-known/agent-card.json
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: agent-runner
  labels:
    app: agent-runner
    app.kubernetes.io/part-of: nannos
spec:
  selector:
    app: agent-runner
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP

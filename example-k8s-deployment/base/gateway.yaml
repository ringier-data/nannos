---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: orchestrator-route
spec:
  parentRefs:
    - name: nannos-gateway
  hostnames:
    - "orchestrator.${BASE_DOMAIN}"
  rules:
    - backendRefs:
        - name: orchestrator-agent
          port: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: console-route
spec:
  parentRefs:
    - name: nannos-gateway
  hostnames:
    - "console.${BASE_DOMAIN}"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api
        - path:
            type: PathPrefix
            value: /mcp
      backendRefs:
        - name: console
          port: 8080
    - backendRefs:
        - name: console
          port: 8081
---

  hostnames:
    - "slack.${BASE_DOMAIN}"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api/v1
      backendRefs:
        - name: client-slack
          port: 8081
    - matches:
        - path:
            type: PathPrefix
            value: /api/v2
      backendRefs:
        - name: client-slack
          port: 8082
    - backendRefs:
        - name: client-slack
          port: 80

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: orchestrator-agent
  labels:
    app: orchestrator-agent
    app.kubernetes.io/part-of: nannos
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: orchestrator-agent
  labels:
    app: orchestrator-agent
    app.kubernetes.io/part-of: nannos
spec:
  replicas: 1
  selector:
    matchLabels:
      app: orchestrator-agent
  template:
    metadata:
      labels:
        app: orchestrator-agent
    spec:
      serviceAccountName: orchestrator-agent
      containers:
      - name: orchestrator-agent
        ports:
        - containerPort: 10001
        env:
        - name: LOG_MODE
          value: "JSON"
        - name: LOG_LEVEL
          value: "INFO"
        - name: LOG_SET_EXCEPTHOOK
          value: "1"
        - name: AWS_REGION
          value: "eu-central-1"
        - name: DEFAULT_LANGUAGE
          value: "en"
        - name: DEFAULT_TIMEZONE
          value: "Europe/Zurich"
        - name: OIDC_ISSUER
          value: "https://login.my-issuer.com/realms/nannos"
        - name: OIDC_CLIENT_ID
          value: "orchestrator"
        - name: AGENT_BASE_URL
          value: "https://orchestrator.${BASE_DOMAIN}"
        - name: CONSOLE_BACKEND_URL
          value: "https://console.${BASE_DOMAIN}"
        - name: MCP_GATEWAY_URL
          value: "https://YOUR_ORG_ID.gatana.ai/mcp"
        - name: MCP_GATEWAY_CLIENT_ID
          value: "gatana"
        - name: A2A_TIMEOUT_CONNECT
          value: "10.0"
        - name: A2A_TIMEOUT_READ
          value: "600.0"
        - name: A2A_TIMEOUT_WRITE
          value: "10.0"
        - name: A2A_TIMEOUT_POOL
          value: "5.0"
        - name: POSTGRES_HOST
          value: "${POSTGRES_HOST}"
        - name: POSTGRES_PORT
          value: "5432"
        - name: POSTGRES_DB
          value: "nannos"
        - name: POSTGRES_USER
          value: "docstore"
        - name: POSTGRES_SCHEMA
          value: "docstore"
        envFrom:
        - secretRef:
            name: orchestrator-secrets
        livenessProbe:
          httpGet:
            path: /.well-known/agent-card.json
            port: 10001
          initialDelaySeconds: 60
          periodSeconds: 60
        readinessProbe:
          httpGet:
            path: /.well-known/agent-card.json
            port: 10001
          initialDelaySeconds: 10
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: orchestrator-agent
  labels:
    app: orchestrator-agent
    app.kubernetes.io/part-of: nannos
spec:
  selector:
    app: orchestrator-agent
  ports:
    - port: 80
      targetPort: 10001
      protocol: TCP

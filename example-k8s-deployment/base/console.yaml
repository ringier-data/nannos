---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: console
  labels:
    app: console
    app.kubernetes.io/part-of: nannos
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: console
  labels:
    app: console
    app.kubernetes.io/part-of: nannos
spec:
  replicas: 1
  selector:
    matchLabels:
      app: console
  template:
    metadata:
      labels:
        app: console
    spec:
      serviceAccountName: console
      containers:
      - name: frontend
        ports:
          - containerPort: 8081
        readinessProbe:
          httpGet:
            path: /
            port: 8081
          initialDelaySeconds: 3
          periodSeconds: 10
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi

      - name: backend
        ports:
        - containerPort: 8080
        env:
        - name: API_PORT
          value: "8080"
        - name: ENVIRONMENT
          value: "${ENV}"
        - name: AWS_REGION
          value: "eu-central-1"
        - name: OIDC_CLIENT_ID
          value: "agent-console"
        - name: OIDC_ISSUER
          value: "https://login.my-issuer.com/realms/nannos"
        - name: BASE_DOMAIN
          value: "console.${BASE_DOMAIN}"
        - name: ORCHESTRATOR_BASE_DOMAIN
          value: "orchestrator.${BASE_DOMAIN}"
        - name: ORCHESTRATOR_CLIENT_ID
          value: "orchestrator"
        - name: POSTGRES_HOST
          value: "${POSTGRES_HOST}"
        - name: POSTGRES_PORT
          value: "5432"
        - name: POSTGRES_DB
          value: "nannos"
        - name: POSTGRES_USER
          value: "console"
        - name: MCP_GATEWAY_URL
          value: "https://YOUR_ORG_ID.gatana.ai/mcp"
        - name: MCP_GATEWAY_CLIENT_ID
          value: "gatana"
        - name: KEYCLOAK_ADMIN_CLIENT_ID # To support KeyCloak editing from within console
          value: "nannos-admin"
        - name: KEYCLOAK_GROUP_NAME_PREFIX # Freetext/optional:To support dev/stg/prod environments in 1 KeyCloak
          value: "${ENV}-"
        envFrom:
        - secretRef:
            name: console-secrets
        livenessProbe:
          httpGet:
            path: /api/v1/health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 60
        readinessProbe:
          httpGet:
            path: /api/v1/health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: console
  labels:
    app: console
    app.kubernetes.io/part-of: nannos
spec:
  selector:
    app: console
  ports:
    - name: frontend
      port: 8081
      targetPort: 8081
      protocol: TCP
    - name: backend
      port: 8080
      targetPort: 8080
      protocol: TCP

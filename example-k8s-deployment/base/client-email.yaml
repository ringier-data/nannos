---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: client-email
  labels:
    app: client-email
    app.kubernetes.io/part-of: nannos
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: client-email
  labels:
    app: client-email
    app.kubernetes.io/part-of: nannos
spec:
  replicas: 1
  selector:
    matchLabels:
      app: client-email
  template:
    metadata:
      labels:
        app: client-email
    spec:
      serviceAccountName: client-email
      containers:
      - name: backend
        ports:
        - containerPort: 8080
        - containerPort: 8081
        env:
        - name: "ENVIRONMENT"
          value: "${ENV}"
        - name: "BASE_DOMAIN"
          value: "${BASE_DOMAIN}"
        - name: "APP_PORT"
          value: "8080"
        - name: "BASE_URL"
          value: "https://email.${BASE_DOMAIN}"
        - name: "HTTP_IDLE_CONNECTION_KEEP_ALIVE_TIMEOUT"
          value: "60"
        - name: "SES_FROM_EMAIL"
          value: "nannos@${BASE_DOMAIN}"
        - name: "SES_REGION"
          value: "eu-central-1"
        - name: "SES_INBOUND_S3_BUCKET"
          value: "email-bucket"
        - name: "SES_INBOUND_S3_PREFIX"
          value: "inbound-emails/"
        - name: "SNS_INBOUND_TOPIC_ARN"
          value: "${EMAIL_SNS_INBOUND_TOPIC_ARN}"
        - name: "STORAGE_PROVIDER"
          value: "postgres"
        - name: "POSTGRES_HOST"
          value: "${POSTGRES_HOST}"
        - name: "POSTGRES_PORT"
          value: "5432"
        - name: "POSTGRES_USER"
          value: "email_client"
        - name: "POSTGRES_DB"
          value: "nannos"
        - name: "POSTGRES_USE_SSL"
          value: "true"
        - name: "OIDC_ISSUER_URL"
          value: "https://login.my-issuer.com/realms/nannos"
        - name: "OIDC_CLIENT_ID"
          value: "email-client"
        - name: "A2A_SERVER_URL"
          value: "https://orchestrator.${BASE_DOMAIN}"
        - name: "ADMIN_GROUP"
          value: "nannos-admin"
        envFrom:
        - secretRef:
            name: client-email-secrets
        livenessProbe:
          httpGet:
            path: /api/v1/health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 60
        readinessProbe:
          httpGet:
            path: /api/v1/health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: client-email
  labels:
    app: client-email
    app.kubernetes.io/part-of: nannos
spec:
  selector:
    app: client-email
  ports:
    - name: v1
      port: 8080
      targetPort: 8080
      protocol: TCP
    - name: v2
      port: 8081
      targetPort: 8081
      protocol: TCP

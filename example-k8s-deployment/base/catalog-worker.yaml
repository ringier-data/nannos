---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: catalog-worker
  labels:
    app: catalog-worker
    app.kubernetes.io/part-of: nannos
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-worker
  labels:
    app: catalog-worker
    app.kubernetes.io/part-of: nannos
spec:
  replicas: 1
  selector:
    matchLabels:
      app: catalog-worker
  template:
    metadata:
      labels:
        app: catalog-worker
    spec:
      serviceAccountName: catalog-worker
      containers:
      - name: catalog-worker
        env:
        - name: ENVIRONMENT
          value: "${ENV}"
        - name: AWS_REGION
          value: "eu-central-1"
        - name: POSTGRES_HOST
          value: "${POSTGRES_HOST}"
        - name: POSTGRES_PORT
          value: "5432"
        - name: POSTGRES_DB
          value: "nannos"
        - name: POSTGRES_USER
          value: "console"
        - name: KMS_VAULT_KEY_ID
          value: "alias/${ENV}-nannos-sensitive-data-kms-key"
        - name: CATALOG_VECTOR_BUCKET_NAME
          value: "${ENV}-nannos-infrastructure-agents-catalog-vectors"
        - name: CATALOG_THUMBNAILS_S3_BUCKET
          value: "${ENV}-nannos-infrastructure-agents-catalog-thumbnails"
        - name: CATALOG_TOKEN_KMS_KEY_ID
          value: "alias/${ENV}-nannos-sensitive-data-kms-key"
        - name: GCP_PROJECT_ID
          value: "YOUR_GCP_PROJECT_ID"
        - name: CONSOLE_BACKEND_URL
          value: "http://console:8080"
        # Set to "1" to enable RSS logging at key pipeline stages — useful
        # for diagnosing memory bloat. Disable in steady-state production.
        - name: CATALOG_LOG_MEMORY
          value: "1"
        envFrom:
        - secretRef:
            name: console-secrets
        livenessProbe:
          exec:
            command:
            - sh
            - -c
            - test -n "$(find /tmp/worker-heartbeat -mmin -1 2>/dev/null)"
          initialDelaySeconds: 30
          periodSeconds: 30
        resources:
          requests:
            # LibreOffice subprocess (soffice) for PPTX rendering legitimately
            # consumes 300-800 MB RSS during conversion. With RENDER_CONCURRENCY=1
            # and FILE_CONCURRENCY=2, peak working set is ~600-900 MB. Request 512Mi
            # for stable scheduling; pod can burst to limit during render.
            cpu: 200m
            memory: 512Mi
          limits:
            # 2Gi headroom for soffice + concurrent file pipelines.
            # Set to 1Gi only after verifying actual peak via CATALOG_LOG_MEMORY.
            cpu: "2"
            memory: 2Gi
